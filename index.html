      ${items.length ? items.map(i => renderChecklistItem(project, i, project.unit, true)).join('') : `<p class="segment-checklist-empty">연결된 할 일이 없어요.</p>`}
      ${addOpen ? renderChecklistAddForm(project, segment.id) : ''}
    </div>`;
}

let calEditingField = null; // null | 'start' | 'deadline' — 시작일/마감일 배지를 눌러서 "이동 모드"로 들어간 상태

function renderMiniCalendar(project){
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + calMonthOffset);
  const year = base.getFullYear();
  const month = base.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayS = todayStr();
  const midDeadlines = (project.segments || []).map(s => s.deadline);
  let cells = '';
  ['일','월','화','수','목','금','토'].forEach(d => cells += `<div class="cal-cell dow">${d}</div>`);
  for (let i=0;i<firstDow;i++) cells += `<div class="cal-cell pad">.</div>`;
  for (let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow = new Date(year, month, day).getDay();
    const isWeekendDay = dow === 0 || dow === 6;
    const rest = isRestDay(dateStr, project.restDays) || (isWeekendDay && !project.includeWeekend);
    const isToday = dateStr === todayS;
    const isDeadlineCell = dateStr === project.deadline;
    const isStartCell = dateStr === project.startDate;
    let markClass = '';
    if (isDeadlineCell) markClass = 'deadline-mark';
    else if (isStartCell) markClass = 'start-mark';
    else if (midDeadlines.includes(dateStr)) markClass = 'middeadline-mark';
    else if (rest) markClass = 'rest';
    const locked = markClass === 'middeadline-mark';
    const armedHl = calEditingField ? ' style="outline:2px dashed var(--accent);outline-offset:-2px"' : '';
    cells += `<div class="cal-cell ${markClass} ${isToday?'today-mark':''}" data-date="${dateStr}" ${locked?'data-locked="1"':''}${armedHl}>${day}</div>`;
  }
  const legend = `
    <div class="cal-legend">
      <span><span class="dot" style="background:var(--accent-bg);border:1px solid var(--accent)"></span>시작일</span>
      <span><span class="dot" style="background:var(--midline-bg)"></span>작업 구간</span>
      <span><span class="dot" style="background:var(--danger-bg)"></span>마감일</span>
      <span><span class="dot" style="background:#eceff1"></span>쉬는날</span>
    </div>`;
  const hint = calEditingField
    ? `<p class="cal-hint" style="color:var(--accent)">변경할 ${calEditingField === 'start' ? '시작일' : '마감일'} 날짜를 눌러주세요.</p>`
    : `<p class="cal-hint">클릭하면 쉬는날로 지정돼요.<br>시작일·마감일을 누르면 날짜 이동이 가능해요.</p>`;
  const periodChecks = `
    <div class="checkbox-row" style="margin-top:8px;margin-bottom:0">
      <label><input type="checkbox" id="d_today" ${project.includeToday?'checked':''} /> 시작일 포함</label>
      <label><input type="checkbox" id="d_deadline_inc" ${project.includeDeadline?'checked':''} /> 마감일 포함</label>
      <label><input type="checkbox" id="d_weekend" ${project.includeWeekend?'checked':''} /> 주말 포함</label>
    </div>`;
  return `
    <div class="cal-nav">
      <button id="calPrev">‹</button>
      <span>${year}년 ${month+1}월</span>
      <button id="calNext">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${legend}
    ${hint}
    ${periodChecks}
  `;
}

let projectEditOpenState = {}; // projectId -> bool
let projectEditDraftState = {}; // projectId -> 저장 전 편집폼 임시값(렌더가 다시 돌아도 입력값 유지)
let bulkFormOpenState = {}; // projectId -> bool, 작업 구간 생성/재지정 슬라이더 폼 펼침 상태
let editingSegNameId = null; // 더블클릭으로 이름 수정 중인 작업 구간 id
let editPeriodState = { today: true, deadline_inc: true, weekend: true };

function captureProjectEditDraft(){

  const totalEl = document.getElementById('e_total');
  const unitEl = document.getElementById('e_unit');
  const startEl = document.getElementById('e_start');
  const deadlineEl = document.getElementById('e_deadline');

function renderDetail(id){
  const p = projects.find(x => x.id === id);
  if (!p) return '<p>프로젝트를 찾을 수 없어요.</p>';
  const pr = calcProjectRisk(p);
  const disp = calcTodayDisplay(p);
  const dday = isDdayProject(p);

  let todayLine = '';
  if (dday) {
    todayLine = `<p class="row" style="font-size:14px"><b>작업량 미지정</b><strong>${pr.ddayLabel}</strong></p>`;
  } else if (pr.risk === 'done') {
    todayLine = `<p class="row" style="font-size:14px"><b>작업 완료</b><strong>완료</strong></p>`;
  } else if (pr.risk === 'notstarted') {
    todayLine = `<p style="font-size:14px">${p.startDate}부터 시작 예정</p>`;
  } else {
    const label = disp.seg ? escapeHtml(disp.seg.name) + ' 기준 ' : '';
    const restToday = (!disp.workableToday && !disp.overdue && !disp.isDeadlineDay);
    const mainVal = restToday ? '쉼' : (disp.overdue ? '마감 지남' : `${disp.todayRemaining ?? disp.perDay}${p.unit}`);
    const avgLine = restToday
      ? `다음 작업일 기준 평균 ${disp.perDay}${p.unit}`
      : (disp.overdue || disp.isDeadlineDay ? '' : `남은날 기준 평균 ${disp.perDay}${p.unit}`);
    todayLine = `
      <p class="row" style="font-size:14px"><b>${label}오늘 해야 할 양</b><strong>${mainVal}</strong></p>
      ${avgLine ? `<p class="muted" style="font-size:12px;text-align:right;margin:2px 0 0">${avgLine}</p>` : ''}
    `;
  }

  const qtySum = checklistQtySum(p);
  const manual = Number(p.manualDone) || 0;
  const canUseButtonMode = !dday && p.total <= 10;
  const doneInputMode = canUseButtonMode && doneInputModeState[p.id] === 'buttons' ? 'buttons' : 'number';
  const quickDoneButtons = (canUseButtonMode && doneInputMode === 'buttons') ? `
    <div class="quick-done-wrap">
      <div class="quick-done-grid">
        ${Array.from({length:p.total}, (_, i) => {
          const n = i + 1;
          const on = n <= manual;
          const current = n === manual;
          return `<button type="button" class="quick-done-btn ${on?'on':''} ${current?'current':''}" data-quick-done="${n}" aria-pressed="${current?'true':'false'}" title="직접 완료 ${n}${escapeHtml(p.unit)}로 설정">${n}</button>`;
        }).join('')}
      </div>
      <p class="quick-done-help">완료된 일감 숫자를 클릭해주세요.</p>
    </div>` : '';
  const doneInput = dday ? '' : `
    <div class="done-input-head">
      <span class="done-input-label">완료한 일감</span>
      <div class="done-input-control">
        ${doneInputMode === 'number' ? `<input type="number" min="0" step="1" max="${p.total}" value="${manual}" id="totalDoneInput" class="num-right" style="width:56px;flex:0 0 auto" />` : ''}
        ${canUseButtonMode ? `<button type="button" class="done-mode-toggle" id="doneModeToggle">${doneInputMode === 'buttons' ? '숫자로 입력' : '버튼으로 보기'}</button>` : ''}
      </div>
    </div>
    ${quickDoneButtons}
    ${qtySum > 0 ? `<p class="muted" style="font-size:12px;text-align:right;margin:4px 0 0">체크리스트 ${qtySum}${p.unit} + 직접 ${manual}${p.unit} = 완료 ${p.done}${p.unit}</p>` : ''}`;

  const badgeText = pr.risk === 'dday' ? pr.ddayLabel : pr.risk === 'notstarted' ? pr.notStartedLabel : riskLabel[pr.risk];
  const badgeClass = pr.risk === 'dday' ? pr.badgeVariant : pr.risk;

  let midlineSection = '';
  if (dday) {
    midlineSection = `
      <div class="subcard">
        <div class="row" style="align-items:center">
          <span class="has-tooltip">
            <strong style="font-size:13px">작업 구간 (0개)</strong>
            <span class="tooltip-bubble">작업량을 여러 작업 구간으로 나눌 수 있어요.</span>
          </span>
        </div>
        <p class="muted" style="font-size:12px">작업량이 없어서 작업 구간을 만들 수 없어요.</p>

    const sortedSegments = p.segments.slice().sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));
    const lastSegId = sortedSegments.length ? sortedSegments[sortedSegments.length-1].id : null;
    const segRows = sortedSegments.map(s => {

            <span class="badge ${sr.risk}">${riskLabel[sr.risk]}</span>
            <input type="date" value="${s.deadline}" data-seg="${s.id}" class="segDeadlineInput seg-deadline-pill num-right" ${isLastSeg ? 'disabled title="마지막 작업 구간의 마감은 프로젝트 마감일을 따라가요"' : ''} />
            <button class="danger-btn" data-delseg="${s.id}">삭제</button>
          </span>
        </div>
        ${renderSegmentChecklist(p, s)}
      </div>`;
    }).join('');

    const emptyBlock = (!p.segments.length && !sliderOpen) ? `
      <p class="muted">현재 작업 구간이 없어요.</p>
      <button class="ghost small" id="midlineEmptyCreateBtn">생성</button>
    ` : '';

    const sliderBlock = sliderOpen ? `
      <div id="bulkFormWrap">${renderBulkForm()}</div>
      <button class="primary small" id="confirmBulkAdd" style="width:100%;margin-top:8px">생성</button>
    ` : '';

    midlineSection = `
      <div class="subcard">
        <div class="row" style="align-items:center">
          <span class="has-tooltip">
            <strong style="font-size:13px">작업 구간 (${p.segments.length}개)</strong>
            <span class="tooltip-bubble">작업량을 여러 작업 구간으로 나눌 수 있어요.</span>
          </span>
          ${p.segments.length ? `<span class="midline-header-actions">
            <button class="icon-btn" id="midlineDeleteAllBtn" style="font-size:16px;color:var(--danger)" aria-label="작업 구간 전체 삭제" title="작업 구간 전체 삭제">−</button>
            ${canMakeMidline ? `<button class="icon-btn midline-fold-arrow" id="midlineToggleBtn" aria-label="${sliderOpen?'작업 구간 편집 접기':'작업 구간 편집 펼치기'}" title="${sliderOpen?'작업 구간 편집 접기':'작업 구간 편집 펼치기'}">${sliderOpen?'▾':'▸'}</button>` : ''}
          </span>` : ''}
        </div>
        <div class="midline-help">프로젝트 마감일까지의 작업량과 기간을 단계별 비율로 나눌 수 있어요.<br>예: 콘티 30% · 밑색 70%</div>
        ${p.segments.length ? `<p class="muted" style="font-size:12px;margin:4px 0 8px">이름을 더블클릭하면 수정할 수 있어요.</p>${segRows}` : ''}
        ${!canMakeMidline ? `<p class="muted" style="font-size:12px">남은 작업 가능일 또는 작업량이 부족해서 작업 구간을 만들 수 없어요.</p>` : `${emptyBlock}${sliderBlock}`}
      </div>`;
  }

  const calendarCard = `<div class="card cal-card">${renderMiniCalendar(p)}</div>`;
  const checklistCard = `
    <div class="card">
      <div class="row" style="align-items:center">
        <h2 style="margin:0">체크리스트</h2>
        ${renderChecklistHeader(p)}
      </div>
      ${renderChecklistBody(p, p.unit)}
    </div>`;
  const calAndChecklist = `<div class="two-col">${calendarCard}${checklistCard}</div>`;

  return `
    <button class="back-btn" id="backToList">&larr; 목록으로</button>
    <div class="card">
      <div class="row detail-head" style="align-items:center">
        <h2 style="margin:0">${escapeHtml(p.name)}</h2>
        <div class="detail-actions">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <button class="icon-btn" id="editProjectBtn" aria-label="프로젝트 수정" title="수정" style="font-size:14px">✎</button>
          <button class="icon-btn" id="deleteProjectBtn" aria-label="프로젝트 삭제" title="삭제" style="font-size:14px;color:var(--danger)">✕</button>

        <div class="info-stat"><span class="lbl">완료</span><span class="val">${dday ? '-' : p.done+p.unit}</span></div>
        <div class="info-stat"><span class="lbl">남음</span><span class="val">${dday ? '-' : (p.total-p.done)+p.unit}</span></div>
      </div>
      <div id="projectEditWrap">${projectEditOpenState[p.id] ? renderProjectEditForm(p) : ''}</div>
      <div class="subcard">
        ${todayLine}
        ${doneInput}
      </div>
      ${midlineSection}
    </div>
    ${calAndChecklist}

}

// 작업 구간 슬라이더 상태: 실제 작업량을 원본으로 유지하고 퍼센트는 표시용으로만 계산한다.
let midlineNames = ['', ''];
let midlineAmounts = [1, 1];
let midlineIds = [null, null];
let midlineFormProjectId = null;
let midlineDragIdx = null;

const AUTO_SEGMENT_NAME_RE = /^(?:작업\s*구간|구간)\s*\d+$/;
function defaultSegmentName(index){ return `작업 구간 ${index + 1}`; }
function normalizeMidlineDefaultNames(){
  midlineNames = midlineNames.map((name, index) => {
    const trimmed = String(name ?? '').trim();
    return (!trimmed || AUTO_SEGMENT_NAME_RE.test(trimmed)) ? defaultSegmentName(index) : name;
  });
}

function splitTotalEvenly(total, count){
  const base = Math.floor(total / count);
  let rest = total % count;
  return Array.from({length:count}, () => base + (rest-- > 0 ? 1 : 0));
}
function initMidlineFormState(p){
  midlineFormProjectId = p.id;
  if (p.segments && p.segments.length >= 2 && p.total > 0) {
    const sorted = sortSegments(p);
    midlineNames = sorted.map(s => s.name || '');
    midlineAmounts = sorted.map(s => toSafePositiveInt(s.amount));
    midlineIds = sorted.map(s => s.id);
    normalizeMidlineDefaultNames();
  } else {
    midlineNames = ['', ''];
    midlineAmounts = splitTotalEvenly(p.total, 2);
    midlineIds = [null, null];
  }
}
function midlineBoundariesFromAmounts(){
  const total = midlineAmounts.reduce((a,b)=>a+b,0) || 1;
  let cumulative = 0;
  return midlineAmounts.slice(0,-1).map(amount => {
    cumulative += amount;
    return cumulative / total * 100;
  });
}
function midlinePercents(){
  const total = midlineAmounts.reduce((a,b)=>a+b,0) || 1;
  const raw = midlineAmounts.map(amount => amount / total * 100);
  const result = raw.map(value => Math.floor(value));
  let remaining = 100 - result.reduce((sum, value) => sum + value, 0);
  raw.map((value, index) => ({ index, fraction: value - Math.floor(value) }))
    .sort((a, b) => b.fraction - a.fraction || a.index - b.index)
    .slice(0, remaining)
    .forEach(item => { result[item.index] += 1; });
  return result;
}

const MIDLINE_PASTELS = ['#ffd9d9','#ffe6bf','#fff6b8','#d9f2d3','#c8ecdf','#c6e3f7','#d8d1f4','#f6d0e8'];

function renderBulkForm(){
  const manyMobileClass = midlineNames.length >= 4 ? ' hide-mobile-many' : '';
  const namesHtml = midlineNames.map((n,i) => `<input value="${escapeHtml(n)}" data-mi="${i}" class="midlineNameInput" placeholder="작업 구간 ${i+1}" />`).join('');
  const boundaries = midlineBoundariesFromAmounts();
  const bounds = [0, ...boundaries, 100];
  const percents = midlinePercents();
  let segHtml = '';
  midlineNames.forEach((n,i) => {
    const color = MIDLINE_PASTELS[i % MIDLINE_PASTELS.length];
    segHtml += `<div class="midline-seg" style="width:${bounds[i+1]-bounds[i]}%;background:${color};color:#4a4a4a" aria-label="작업 구간 ${i+1} ${percents[i]}%">${percents[i]}%</div>`;
  });
  const handlesHtml = boundaries.map((b,i) => `<div class="midline-handle" data-handle="${i}" style="left:${b}%"></div>`).join('');
  return `
    <div class="midline-bar-wrap">
      <div class="midline-bar" id="midlineBar">${segHtml}${handlesHtml}</div>
    </div>
    <div class="midline-names${manyMobileClass}">${namesHtml}</div>
    <p class="muted" style="margin:4px 0 0;font-size:11px">바를 누르면 작업 구간이 추가되고, 손잡이를 누르면 구간이 합쳐져요. 화면이 좁을 경우 기본 이름으로 생성돼요.</p>
  `;
}

function updateMidlineBarDom(){
  const bar = document.getElementById('midlineBar');
  if (!bar) return false;
  const segs = bar.querySelectorAll('.midline-seg');
  const handles = bar.querySelectorAll('.midline-handle');
  if (segs.length !== midlineNames.length || handles.length !== Math.max(midlineAmounts.length - 1, 0)) return false;
  const boundaries = midlineBoundariesFromAmounts();
  const bounds = [0, ...boundaries, 100];
  const percents = midlinePercents();
  segs.forEach((seg, i) => {
    seg.style.width = `${bounds[i+1] - bounds[i]}%`;
    seg.textContent = `${percents[i]}%`;
    seg.setAttribute('aria-label', `작업 구간 ${i+1} ${percents[i]}%`);
  });
  handles.forEach((handle, i) => { handle.style.left = `${boundaries[i]}%`; });
  return true;
}

let midlinePointerDownX = null;
let midlineMoved = false;
let midlineActivePointerId = null;
let midlineIgnoreClickUntil = 0;

function bindBulkEvents(){
  document.querySelectorAll('.midlineNameInput').forEach(el => {
    el.oninput = (e) => { midlineNames[Number(e.target.dataset.mi)] = e.target.value; };
  });
  const refreshBar = () => {
    const wrap = document.getElementById('bulkFormWrap');
    if (wrap) { wrap.innerHTML = renderBulkForm(); bindBulkEvents(); }
  };

  document.querySelectorAll('.midline-handle').forEach(handle => {
    handle.onpointerdown = (e) => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault(); e.stopPropagation();
      midlineDragIdx = Number(handle.dataset.handle);
      midlinePointerDownX = e.clientX;
      midlineMoved = false;
      midlineActivePointerId = e.pointerId;
      try { handle.setPointerCapture(e.pointerId); } catch (_) {}
    };
  });
  document.onpointermove = (e) => {
    if (midlineDragIdx === null) return;
    if (midlineActivePointerId !== null && e.pointerId !== midlineActivePointerId) return;
    e.preventDefault();
    if (Math.abs(e.clientX - midlinePointerDownX) > 3) midlineMoved = true;
    const bar = document.getElementById('midlineBar');
    if (!bar) return;
    const rect = bar.getBoundingClientRect();
    const total = midlineAmounts.reduce((a,b)=>a+b,0);
    const beforePair = midlineAmounts.slice(0, midlineDragIdx).reduce((a,b)=>a+b,0);
    const pairTotal = midlineAmounts[midlineDragIdx] + midlineAmounts[midlineDragIdx+1];
    let targetCumulative = Math.round(((e.clientX - rect.left) / rect.width) * total);
    let leftAmount = targetCumulative - beforePair;
    leftAmount = Math.max(1, Math.min(pairTotal - 1, leftAmount));
    midlineAmounts[midlineDragIdx] = leftAmount;
    midlineAmounts[midlineDragIdx+1] = pairTotal - leftAmount;
    updateMidlineBarDom();
  };
  const finishMidlinePointer = (e, cancelled = false) => {
    if (midlineDragIdx === null) return;
    if (midlineActivePointerId !== null && e && e.pointerId !== midlineActivePointerId) return;
    if (!cancelled && !midlineMoved && midlineNames.length > 2) {
      midlineAmounts[midlineDragIdx] += midlineAmounts[midlineDragIdx+1];
      midlineAmounts.splice(midlineDragIdx+1, 1);
      midlineNames.splice(midlineDragIdx+1, 1);
      midlineIds.splice(midlineDragIdx+1, 1);
      normalizeMidlineDefaultNames();
      refreshBar();
    }
    midlineIgnoreClickUntil = Date.now() + 350;
    midlineDragIdx = null;
    midlineActivePointerId = null;
  };
  document.onpointerup = (e) => finishMidlinePointer(e, false);
  document.onpointercancel = (e) => finishMidlinePointer(e, true);

  const bar = document.getElementById('midlineBar');
  if (bar) bar.onclick = (e) => {
    if (Date.now() < midlineIgnoreClickUntil || e.target.classList.contains('midline-handle')) return;
    const p = projects.find(x=>x.id===view.projectId);
    const max = midlineMaxAllowed(p);
    if (midlineNames.length >= max) { showToast(`작업 구간은 최대 ${max}개까지 만들 수 있어요.`); return; }
    const rect = bar.getBoundingClientRect();
    const total = midlineAmounts.reduce((a,b)=>a+b,0);
    let unitPos = Math.max(1, Math.min(total - 1, Math.round(((e.clientX - rect.left) / rect.width) * total)));
    let cumulative = 0, splitIndex = -1;
    for (let i=0; i<midlineAmounts.length; i++) {
      if (unitPos > cumulative && unitPos < cumulative + midlineAmounts[i]) { splitIndex = i; break; }
      cumulative += midlineAmounts[i];
    }
    if (splitIndex === -1) { showToast('이 위치의 작업량이 1이라 더 나눌 수 없어요.'); return; }
    const before = midlineAmounts.slice(0, splitIndex).reduce((a,b)=>a+b,0);
    const left = unitPos - before;
    const right = midlineAmounts[splitIndex] - left;
    if (left < 1 || right < 1) { showToast('각 작업 구간에는 작업량이 1 이상 필요해요.'); return; }
    midlineAmounts[splitIndex] = left;
    midlineAmounts.splice(splitIndex+1, 0, right);
    midlineNames.splice(splitIndex+1, 0, '');
    midlineIds.splice(splitIndex+1, 0, null);
    normalizeMidlineDefaultNames();
    refreshBar();
  };
}

let deadlineViewerMonthOffset = 0;
let deadlineViewerSelectedDate = null;

function maxDateStr(a, b){ return a > b ? a : b; }
function minDateStr(a, b){ return a < b ? a : b; }
function deadlineViewerDateLabel(dateStr){
  const d = toDateOnly(dateStr);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function deadlineViewerProjectColor(projectId){
  const id = String(projectId || '');
  const numericId = /^id(\d+)$/.exec(id);
  if (numericId) return DEADLINE_VIEWER_PROJECT_COLORS[(Number(numericId[1]) - 1) % DEADLINE_VIEWER_PROJECT_COLORS.length];
  let hash = 0;
  for (let i=0; i<id.length; i++) hash = ((hash * 31) + id.charCodeAt(i)) >>> 0;
  return DEADLINE_VIEWER_PROJECT_COLORS[hash % DEADLINE_VIEWER_PROJECT_COLORS.length];
}
function deadlineEventTypeRank(type){ return type === 'mid' ? 0 : 1; }

function collectDeadlineViewerData(rangeStart, rangeEnd){
  const events = [];
  const timelines = [];

  projects.forEach((project, projectIndex) => {
    const finalDate = isValidDateString(project.deadline) ? project.deadline : null;
    if (!finalDate) return;

    const color = deadlineViewerProjectColor(project.id);
    const midMarkers = (project.segments || [])
      .filter(segment => segment && isValidDateString(segment.deadline) && segment.deadline < finalDate)
      .sort((a,b) => a.deadline.localeCompare(b.deadline))
      .map((segment, segmentIndex) => ({
        date: segment.deadline,
        type: 'mid',
        label: `${project.name} · ${segment.name || `작업 구간 ${segmentIndex + 1}`}`
      }));

    midMarkers.forEach(marker => {
      events.push({
        date: marker.date,
        type: 'mid',
        label: marker.label,
        projectId: project.id,
        projectName: project.name,
        color,
        order: projectIndex
      });
    });
    events.push({
      date: finalDate,
      type: 'final',
      label: project.name,
      projectId: project.id,
      projectName: project.name,
      color,
      order: projectIndex
    });

    const timelineStart = isValidDateString(project.startDate) ? project.startDate : finalDate;
    const visibleStart = maxDateStr(timelineStart, rangeStart);
    const visibleEnd = minDateStr(finalDate, rangeEnd);
    if (visibleStart > visibleEnd) return;

    timelines.push({
      kind: timelineStart === finalDate ? 'finalOnly' : 'range',
      projectId: project.id,
      projectName: project.name,
      color,
      order: projectIndex,
      endDate: finalDate,
      midDates: midMarkers.map(marker => marker.date),
      visibleStart,
      visibleEnd,
      firstVisibleWeek: Math.floor(daysBetween(rangeStart, visibleStart) / 7)
    });
  });

  events.sort((a,b) => a.date.localeCompare(b.date) || a.order - b.order || deadlineEventTypeRank(a.type) - deadlineEventTypeRank(b.type));
  const sortedTimelines = timelines.slice().sort((a,b) => a.visibleStart.localeCompare(b.visibleStart) || a.visibleEnd.localeCompare(b.visibleEnd) || a.order - b.order);
  const laneEnds = [];
  sortedTimelines.forEach(timeline => {
    let lane = laneEnds.findIndex(endDate => endDate < timeline.visibleStart);
    if (lane === -1) lane = laneEnds.length;
    laneEnds[lane] = timeline.visibleEnd;
    timeline.lane = lane;
  });

  return { events, timelines: sortedTimelines };
}

function renderDeadlineViewer(overlay, opts = {}){
  if (!overlay || !overlay.isConnected) return;

  const isMain = opts.mode === 'main';
  const monthOffset = isMain ? mainCalendarMonthOffset : deadlineViewerMonthOffset;
  let selectedDate = isMain ? mainCalendarSelectedDate : deadlineViewerSelectedDate;
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + monthOffset);
  const year = base.getFullYear();
  const month = base.getMonth();
  const monthStart = fmtLocalDate(new Date(year, month, 1));
  const monthEnd = fmtLocalDate(new Date(year, month + 1, 0));
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;
  const gridStart = addDaysStr(monthStart, -firstDow);
  const gridEnd = addDaysStr(gridStart, totalCells - 1);

  const { events, timelines } = collectDeadlineViewerData(gridStart, gridEnd);
  const byDate = new Map();
  events.forEach(event => {
    if (!byDate.has(event.date)) byDate.set(event.date, []);
    byDate.get(event.date).push(event);
  });

  if (selectedDate && (selectedDate < gridStart || selectedDate > gridEnd)) {
    selectedDate = null;
    if (isMain) mainCalendarSelectedDate = null;
    else deadlineViewerSelectedDate = null;
  }

  const dowHtml = ['일','월','화','수','목','금','토']
    .map((day, index) => `<div class="deadline-calendar-dow ${index === 0 || index === 6 ? 'weekend' : ''}">${day}</div>`)
    .join('');

  let weeksHtml = '';
  const weekCount = totalCells / 7;
  const weekMeta = Array.from({length:weekCount}, (_, weekIndex) => {
    const weekStart = addDaysStr(gridStart, weekIndex * 7);
    const weekEnd = addDaysStr(weekStart, 6);
    const allActiveTimelines = timelines
      .filter(timeline => !(timeline.visibleEnd < weekStart || timeline.visibleStart > weekEnd))
      .sort((a,b) => {
        const aFinalInWeek = a.endDate >= weekStart && a.endDate <= weekEnd;
        const bFinalInWeek = b.endDate >= weekStart && b.endDate <= weekEnd;
        if (aFinalInWeek !== bFinalInWeek) return aFinalInWeek ? -1 : 1;
        const aMidDates = (a.midDates || []).filter(date => date >= weekStart && date <= weekEnd);
        const bMidDates = (b.midDates || []).filter(date => date >= weekStart && date <= weekEnd);
        const aMidInWeek = aMidDates.length > 0;
        const bMidInWeek = bMidDates.length > 0;
        if (aMidInWeek !== bMidInWeek) return aMidInWeek ? -1 : 1;
        if (aFinalInWeek && bFinalInWeek && a.endDate !== b.endDate) return a.endDate.localeCompare(b.endDate);
        if (aMidInWeek && bMidInWeek) {
          const midCompare = aMidDates[0].localeCompare(bMidDates[0]);
          if (midCompare) return midCompare;
        }
        if (a.endDate !== b.endDate) return a.endDate.localeCompare(b.endDate);
        return a.order - b.order;
      });
    const expanded = isMain && mainCalendarExpandedWeeks.has(weekStart) && allActiveTimelines.length > MAIN_CALENDAR_MAX_LINES;
    const activeTimelines = (isMain && !expanded) ? allActiveTimelines.slice(0, MAIN_CALENDAR_MAX_LINES) : allActiveTimelines;
    const hiddenTimelines = allActiveTimelines.slice(activeTimelines.length);
    // 메인 달력은 접힌 상태에서 항상 3개 행 높이를 유지한다. 펼친 주만 필요한 만큼 늘어난다.
    const visibleLaneCount = isMain ? (expanded ? Math.max(MAIN_CALENDAR_MAX_LINES, activeTimelines.length) : MAIN_CALENDAR_MAX_LINES) : Math.max(1, activeTimelines.length);
    const footerHeight = isMain ? 23 : 0;
    const scheduleHeight = Math.max(56, visibleLaneCount * 24 + 18 + footerHeight);
    return { weekIndex, weekStart, weekEnd, allActiveTimelines, expanded, activeTimelines, hiddenTimelines, scheduleHeight };
  });
  for (const meta of weekMeta) {
    const { weekIndex, weekStart, weekEnd, expanded, activeTimelines, hiddenTimelines, scheduleHeight } = meta;

    let dateCellsHtml = '';
    for (let dayOffset=0; dayOffset<7; dayOffset++) {
      const dateStr = addDaysStr(weekStart, dayOffset);
      const cellDate = toDateOnly(dateStr);
      const day = cellDate.getDate();
      const dow = cellDate.getDay();
      const inMonth = dateStr >= monthStart && dateStr <= monthEnd;
      const dayEvents = byDate.get(dateStr) || [];
      const classes = [
        'deadline-calendar-date-cell',
        inMonth ? '' : 'outside',
        (dow === 0 || dow === 6) ? 'weekend' : '',
        dateStr === todayStr() ? 'today' : '',
        dateStr === selectedDate ? 'selected' : ''
      ].filter(Boolean).join(' ');
      const ariaLabel = `${deadlineViewerDateLabel(dateStr)}${dayEvents.length ? `, 마감 ${dayEvents.length}개` : ''}`;
      dateCellsHtml += `<button type="button" class="${classes}" data-deadline-date="${dateStr}" aria-label="${ariaLabel}">
        <span class="deadline-calendar-date">${day}</span>
      </button>`;
    }

    const scheduleItemsHtml = activeTimelines.map((timeline, displayLane) => {
      if (timeline.kind === 'finalOnly') {
        const finalCol = daysBetween(weekStart, timeline.endDate);
        if (finalCol < 0 || finalCol > 6) return '';
        const soft = hexToRgba(timeline.color, 0.11);
        const border = hexToRgba(timeline.color, 0.24);
        return `<button type="button" class="deadline-final-only" style="--column:${finalCol}; --lane:${displayLane}; --bar-color:${timeline.color}; --bar-soft:${soft}; --bar-border:${border}" data-deadline-project="${timeline.projectId}" title="${escapeHtml(timeline.projectName)}">${escapeHtml(timeline.projectName)}</button>`;
      }

      const segmentStart = maxDateStr(timeline.visibleStart, weekStart);
      const segmentEnd = minDateStr(timeline.visibleEnd, weekEnd);
      const startCol = daysBetween(weekStart, segmentStart);
      const endCol = daysBetween(weekStart, segmentEnd);
      // 주가 바뀌는 지점에서는 행 끝/시작까지 선을 억지로 연장하지 않는다.
      // 각 주에서 실제로 보이는 첫 날짜와 마지막 날짜의 셀 중앙까지만 그린다.
      let lineLeftPct = ((startCol + 0.5) / 7) * 100;
      let lineRightPct = ((endCol + 0.5) / 7) * 100;
      if (lineRightPct < lineLeftPct) [lineLeftPct, lineRightPct] = [lineRightPct, lineLeftPct];
      let lineWidthPct = lineRightPct - lineLeftPct;
      if (lineWidthPct < 0.1) {
        lineLeftPct = Math.max(0, lineLeftPct - (0.28 / 7 * 100));
        lineRightPct = Math.min(100, lineRightPct + (0.28 / 7 * 100));
        lineWidthPct = lineRightPct - lineLeftPct;
      }

      const labelHtml = `<span class="deadline-project-label">${escapeHtml(timeline.projectName)}</span>`;
      const barSoft = hexToRgba(timeline.color, 0.11);
      const barBorder = hexToRgba(timeline.color, 0.24);
      const barShadow = hexToRgba(timeline.color, 0.20);
      const lineHtml = `<button type="button" class="deadline-project-bar" style="--line-left:${lineLeftPct.toFixed(4)}%; --line-width:${lineWidthPct.toFixed(4)}%; --lane:${displayLane}; --bar-color:${timeline.color}; --bar-soft:${barSoft}; --bar-border:${barBorder}; --bar-shadow:${barShadow}" data-deadline-project="${timeline.projectId}" title="${escapeHtml(timeline.projectName)}">
        <span class="deadline-project-line"></span>
        ${labelHtml}
      </button>`;

      return lineHtml;
    }).join('');

    const midMarkersHtml = activeTimelines.map((timeline, displayLane) => {
      return (timeline.midDates || [])
        .filter(date => date >= weekStart && date <= weekEnd)
        .map(date => {
          const column = daysBetween(weekStart, date);
          return `<span class="deadline-project-mid-dot" style="--column:${column}; --lane:${displayLane}; --marker-color:${timeline.color}" aria-hidden="true"></span>`;
        }).join('');
    }).join('');

    const columnsHtml = '<div class="deadline-week-columns">' + Array.from({length:7}, (_, dayOffset) => {
      const columnDate = addDaysStr(weekStart, dayOffset);
      return `<span class="deadline-week-column ${columnDate === todayStr() ? 'today' : ''}" data-calendar-column-date="${columnDate}"></span>`;
    }).join('') + '</div>';
    const hiddenTitle = hiddenTimelines.map(t => t.projectName).join(' · ');
    const moreHtml = isMain && (hiddenTimelines.length || expanded)
      ? `<button type="button" class="deadline-calendar-more" data-calendar-more-week="${weekStart}" title="${escapeHtml(hiddenTitle)}">${expanded ? '접기' : `+${hiddenTimelines.length}`}</button>` : '';
    weeksHtml += `<div class="deadline-calendar-week" data-week-start="${weekStart}">
      <div class="deadline-week-date-row">${dateCellsHtml}</div>
      <div class="deadline-week-schedule" style="--schedule-height:${scheduleHeight}px">
        ${columnsHtml}
        ${scheduleItemsHtml}
        ${midMarkersHtml}
        ${moreHtml}
      </div>
    </div>`;
  }

  const selectedEvents = (byDate.get(selectedDate) || []).slice()
    .sort((a,b) => a.order - b.order || deadlineEventTypeRank(a.type) - deadlineEventTypeRank(b.type));
  const detailHtml = selectedEvents.length ? `
    <div class="deadline-viewer-detail">
      <h4>${deadlineViewerDateLabel(selectedDate)}</h4>
      ${selectedEvents.map(event => `
        <button type="button" class="deadline-viewer-item" data-deadline-project="${event.projectId}" style="--item-color:${event.color}">
          <span class="deadline-viewer-item-type ${event.type}">${event.type === 'final' ? '최종 마감' : '작업 구간'}</span>
          <span class="deadline-viewer-item-name">${escapeHtml(event.label)}</span>
        </button>`).join('')}
    </div>` : '';

  overlay.querySelector('.deadline-viewer-content').innerHTML = `
    <div class="deadline-viewer-nav">
      <strong>${year}년 ${month + 1}월</strong>
      <button type="button" data-deadline-prev aria-label="이전 달">‹</button>
      <button type="button" data-deadline-next aria-label="다음 달">›</button>
    </div>
    ${isMain ? `<div class="main-calendar-help-row">
      <span class="main-calendar-help-drag">프로젝트 선을 드래그하면 일정 전체가 이동해요.</span>
    </div>` : ``}
    <div class="deadline-calendar-month">
      <div class="deadline-calendar-dow-row">${dowHtml}</div>
      ${weeksHtml}
    </div>
    ${detailHtml}`;

  overlay.querySelector('[data-deadline-prev]').onclick = () => {
    if (isMain) { mainCalendarMonthOffset--; mainCalendarSelectedDate = null; }
    else { deadlineViewerMonthOffset--; deadlineViewerSelectedDate = null; }
    renderDeadlineViewer(overlay, opts);
  };
  overlay.querySelector('[data-deadline-next]').onclick = () => {
    if (isMain) { mainCalendarMonthOffset++; mainCalendarSelectedDate = null; }
    else { deadlineViewerMonthOffset++; deadlineViewerSelectedDate = null; }
    renderDeadlineViewer(overlay, opts);
  };
  overlay.querySelectorAll('[data-deadline-date]').forEach(cell => {
    cell.onclick = () => {
      if (Date.now() < calendarDragSuppressClickUntil) return;
      if (isMain) mainCalendarSelectedDate = cell.dataset.deadlineDate;
      else deadlineViewerSelectedDate = cell.dataset.deadlineDate;
      renderDeadlineViewer(overlay, opts);
    };
  });
  overlay.querySelectorAll('[data-calendar-more-week]').forEach(button => {
    button.onclick = (event) => {
      event.stopPropagation();
      const week = button.dataset.calendarMoreWeek;
      if (mainCalendarExpandedWeeks.has(week)) mainCalendarExpandedWeeks.delete(week);
      else mainCalendarExpandedWeeks.add(week);
      renderDeadlineViewer(overlay, opts);
    };
  });
  overlay.querySelectorAll('[data-deadline-project]').forEach(button => {
    button.onclick = (event) => {
      event.stopPropagation();
      if (Date.now() < calendarDragSuppressClickUntil) return;
      const projectId = button.dataset.deadlineProject;
      if (!isMain) {
        if (typeof overlay._closeDeadlineViewer === 'function') overlay._closeDeadlineViewer();
        else overlay.remove();
      }
      view.screen = 'detail';
      view.projectId = projectId;
      calMonthOffset = 0;
      calEditingField = null;
      render();
    };
  });
  if (isMain) bindCalendarProjectDrag(overlay);
}

function calendarDateAtPoint(root, clientX, clientY){
  const target = document.elementFromPoint(clientX, clientY);
  if (!target || !root.contains(target)) return null;
  const dateCell = target.closest('[data-deadline-date]');
  if (dateCell) return dateCell.dataset.deadlineDate;
  const column = target.closest('[data-calendar-column-date]');
  if (column) return column.dataset.calendarColumnDate;
  const week = target.closest('.deadline-calendar-week[data-week-start]');
  if (!week) return null;
  const rect = week.getBoundingClientRect();
  const col = Math.max(0, Math.min(6, Math.floor(((clientX - rect.left) / Math.max(rect.width,1)) * 7)));
  return addDaysStr(week.dataset.weekStart, col);
}
function clearCalendarDropTarget(root){
  root.querySelectorAll('.calendar-drop-target').forEach(el => el.classList.remove('calendar-drop-target'));
}
function markCalendarDropTarget(root, dateStr){
  clearCalendarDropTarget(root);
  if (!dateStr) return;
  root.querySelectorAll(`[data-deadline-date="${dateStr}"], [data-calendar-column-date="${dateStr}"]`).forEach(el => el.classList.add('calendar-drop-target'));
}
function bindCalendarProjectDrag(root){
  root.querySelectorAll('.deadline-project-bar[data-deadline-project], .deadline-final-only[data-deadline-project]').forEach(button => {
    button.onpointerdown = (event) => {
      if (event.pointerType === 'mouse' && event.button !== 0) return;
      const sourceDate = calendarDateAtPoint(root, event.clientX, event.clientY);
      if (!sourceDate) return;

      const pointerId = event.pointerId;
      const startX = event.clientX;
      const startY = event.clientY;
      const isTouchLike = event.pointerType === 'touch' || event.pointerType === 'pen';
      let dragging = false;
      let moved = false;
      let cancelledBeforeDrag = false;
      let targetDate = sourceDate;
      let longPressTimer = null;

      const clearLongPressTimer = () => {
        if (longPressTimer !== null) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
      };
      const startDragging = () => {
        if (dragging || cancelledBeforeDrag) return;
        dragging = true;
        clearLongPressTimer();
        calendarDragSuppressClickUntil = Date.now() + 500;
        try { button.setPointerCapture(pointerId); } catch (_) {}
        button.classList.remove('calendar-longpress-ready');
        button.classList.add('calendar-dragging');
        document.body.classList.add('calendar-project-drag-active');
        markCalendarDropTarget(root, targetDate);
      };
      const cleanup = () => {
        clearLongPressTimer();
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onCancel);
        button.classList.remove('calendar-longpress-ready', 'calendar-dragging');
        document.body.classList.remove('calendar-project-drag-active');
        clearCalendarDropTarget(root);
      };
      const onMove = (e) => {
        if (e.pointerId !== pointerId) return;
        const distance = Math.hypot(e.clientX - startX, e.clientY - startY);

        if (isTouchLike && !dragging) {
          // 길게 누르기 전에 손가락이 움직이면 달력 이동이 아니라 페이지 스크롤로 본다.
          if (distance > 8) {
            cancelledBeforeDrag = true;
            clearLongPressTimer();
            button.classList.remove('calendar-longpress-ready');
          }
          return;
        }
        if (!isTouchLike && !dragging && distance > 5) startDragging();
        if (!dragging) return;

        e.preventDefault();
        moved = moved || distance > 3;
        targetDate = calendarDateAtPoint(root, e.clientX, e.clientY) || targetDate;
        markCalendarDropTarget(root, targetDate);
      };
      const finish = (e, cancelled = false) => {
        if (e.pointerId !== pointerId) return;
        const wasDragging = dragging;
        cleanup();
        if (!wasDragging || cancelled) return;

        calendarDragSuppressClickUntil = Date.now() + 500;
        if (!moved) return;
        const delta = daysBetween(sourceDate, targetDate);
        if (!delta) return;
        const project = projects.find(p => p.id === button.dataset.deadlineProject);
        if (!project) return;
        const error = shiftProjectSchedule(project, delta);
        if (error) {
          showToast(error);
          render();
          return;
        }
        showToast(`${project.name} 일정을 ${Math.abs(delta)}일 ${delta > 0 ? '뒤로' : '앞으로'} 옮겼어요.`);
        render();
      };
      const onUp = e => finish(e, false);
      const onCancel = e => finish(e, true);

      event.stopPropagation();
      if (!isTouchLike) {
        event.preventDefault();
        try { button.setPointerCapture(pointerId); } catch (_) {}
      } else {
        button.classList.add('calendar-longpress-ready');
        longPressTimer = setTimeout(startDragging, 400);
      }

      window.addEventListener('pointermove', onMove, { passive:false });
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onCancel);
    };
  });
}

// 클릭 없이 잠깐 보이고 사라지는 경고. 확인 눌러야 닫히는 confirm/alert와 다름 (그냥 인지만 시키면 되는 경우용)
let toastTimer = null;
function showToast(message){
  let box = document.getElementById('toastBox');
  if (!box) {
    const overlay = document.createElement('div');
    overlay.className = 'toast-overlay';
    overlay.innerHTML = '<div class="toast-box" id="toastBox"></div>';
    document.body.appendChild(overlay);
    box = overlay.querySelector('#toastBox');
  }
  box.textContent = message;
  box.classList.remove('show');
  requestAnimationFrame(() => box.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => box.classList.remove('show'), 1800);
}

// 네이티브 confirm() 대체용 커스텀 확인창. onConfirm은 "삭제" 눌렀을 때만 실행됨
function customConfirm(message, onConfirm, opts = {}){
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  const confirmLabel = opts.confirmLabel || '삭제';
  const cancelLabel = opts.cancelLabel || '취소';
  const confirmClass = opts.confirmClass || 'danger-btn';
  overlay.innerHTML = `
    <div class="confirm-box">
      <p></p>
      <div class="confirm-actions">
        <button class="ghost small" id="confirmCancelBtn"></button>
        <button class="${confirmClass}" id="confirmOkBtn"></button>
      </div>
    </div>`;
  overlay.querySelector('p').textContent = message;
  overlay.querySelector('#confirmCancelBtn').textContent = cancelLabel;
  overlay.querySelector('#confirmOkBtn').textContent = confirmLabel;
  document.body.appendChild(overlay);
  overlay.querySelector('#confirmCancelBtn').onclick = () => overlay.remove();
  overlay.querySelector('#confirmOkBtn').onclick = () => { overlay.remove(); onConfirm(); };
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
}

function moveProjectRelative(fromId, toId, placeAfter = false){
  if (!fromId || !toId || fromId === toId) return false;
  const beforeOrder = projects.map(p => p.id).join('|');
  const fromIdx = projects.findIndex(p => p.id === fromId);
  if (fromIdx === -1) return false;
  const [moved] = projects.splice(fromIdx, 1);
  const targetIdx = projects.findIndex(p => p.id === toId);
  if (targetIdx === -1) {
    projects.splice(fromIdx, 0, moved);
    return false;
  }
  projects.splice(targetIdx + (placeAfter ? 1 : 0), 0, moved);
  return projects.map(p => p.id).join('|') !== beforeOrder;
}
function moveProjectBefore(fromId, toId){
  return moveProjectRelative(fromId, toId, false);
}

function clearProjectDropMarks(selector){
  document.querySelectorAll(selector).forEach(node => node.classList.remove('drag-over','drag-before','drag-after'));
}
function markProjectDropTarget(target, placeAfter, insertionLine){
  if (!target) return;
  if (insertionLine) target.classList.add(placeAfter ? 'drag-after' : 'drag-before');
  else target.classList.add('drag-over');
}
function projectDropPlaceAfter(target, clientX, clientY, axis = 'y'){
  const rect = target.getBoundingClientRect();
  const dx = (clientX - (rect.left + rect.width / 2)) / Math.max(rect.width, 1);
  const dy = (clientY - (rect.top + rect.height / 2)) / Math.max(rect.height, 1);
  if (axis === 'x') return dx > 0;
  if (axis === 'auto') return Math.abs(dx) >= Math.abs(dy) ? dx > 0 : dy > 0;
  return dy > 0;
}

let suppressProjectOpenUntil = 0;
function bindTouchProjectReorder(selector, opts = {}){
  const handleSelector = opts.handleSelector || null;
  const insertionLine = !!opts.insertionLine;
  const dismissHintOnMove = !!opts.dismissHintOnMove;
  const axis = opts.axis || 'y';
  document.querySelectorAll(selector).forEach(el => {
    const handle = handleSelector ? el.querySelector(handleSelector) : el;
    if (!handle) return;
    let holdTimer = null;
    let pointerId = null;
    let startX = 0;
    let startY = 0;
    let active = false;
    let targetEl = null;
    let placeAfter = false;

    const clearHold = () => {
      if (holdTimer !== null) clearTimeout(holdTimer);
      holdTimer = null;
    };
    const clearTarget = () => {
      clearProjectDropMarks(selector);
      targetEl = null;
      placeAfter = false;
    };
    const cleanup = () => {
      clearHold();
      clearTarget();
      el.classList.remove('touch-reorder-source');
      handle.draggable = true;
      document.body.classList.remove('touch-reorder-active');
      active = false;
      pointerId = null;
    };

    handle.onpointerdown = (e) => {
      if (e.pointerType === 'mouse' || e.isPrimary === false) return;
      if (!handleSelector && e.target.closest('button,input,select,textarea,a,.proj-menu')) return;
      pointerId = e.pointerId;
      handle.draggable = false; // iPad/Safari의 네이티브 HTML 드래그와 충돌 방지
      startX = e.clientX;
      startY = e.clientY;
      clearHold();
      holdTimer = setTimeout(() => {
        if (pointerId !== e.pointerId) return;
        active = true;
        el.classList.add('touch-reorder-source');
        document.body.classList.add('touch-reorder-active');
        try { handle.setPointerCapture(pointerId); } catch (_) {}
      }, 240);
    };
    handle.onpointermove = (e) => {
      if (e.pointerId !== pointerId) return;
      const distance = Math.hypot(e.clientX - startX, e.clientY - startY);
      if (!active) {
        if (distance > 8) clearHold();
        return;
      }
      e.preventDefault();
      const hit = document.elementFromPoint(e.clientX, e.clientY);
      const nextTarget = hit && hit.closest ? hit.closest(selector) : null;
      const nextAfter = !!(nextTarget && projectDropPlaceAfter(nextTarget, e.clientX, e.clientY, axis));
      if (nextTarget === targetEl && nextAfter === placeAfter) return;
      clearTarget();
      if (nextTarget && nextTarget !== el) {
        targetEl = nextTarget;
        placeAfter = nextAfter;
        markProjectDropTarget(targetEl, placeAfter, insertionLine);
      }
    };
    const finish = (e, cancelled = false) => {
      if (e.pointerId !== pointerId) return;
      const wasActive = active;
      const fromId = el.dataset.id;
      const toId = targetEl && targetEl.dataset.id;
      const after = placeAfter;
      if (wasActive) {
        e.preventDefault();
        suppressProjectOpenUntil = Date.now() + 500;
      }
      cleanup();
      const moved = !cancelled && wasActive && (insertionLine
        ? moveProjectRelative(fromId, toId, after)
        : moveProjectBefore(fromId, toId));
      if (moved) {
        if (dismissHintOnMove) dismissReorderHint();
        render();
      }
    };
    handle.onpointerup = (e) => finish(e, false);
    handle.onpointercancel = (e) => finish(e, true);
    handle.onlostpointercapture = (e) => {
      if (pointerId !== null && e.pointerId === pointerId) finish(e, true);
    };
  });
}

// 화면을 다시 그릴 때마다 호출. 성격별 그룹으로 나눠 각자 자기 화면 요소에만 이벤트를 붙인다(요소 없으면 자동으로 건너뜀).
