const STORAGE_QUOTA_WARN_RATIO = 0.8;
const STORAGE_QUOTA_CHECK_INTERVAL_MS = 60 * 1000;
const LOCAL_STORAGE_REFERENCE_BYTES = 5 * 1024 * 1024;
let storageQuotaWarning = false;
let storageQuotaPercent = 0;
let lastStorageQuotaCheckAt = 0;
let storageQuotaCheckTimer = null;
function estimateLocalStorageBytes(){
  try {
    let chars = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || '';
      const value = localStorage.getItem(key) || '';
      chars += key.length + value.length;
    }
    return chars * 2; // UTF-16 근사치
  } catch (_) { return 0; }
}
async function checkStorageQuota(opts = {}){
  const force = !!opts.force;
  const now = Date.now();
  if (!force && now - lastStorageQuotaCheckAt < STORAGE_QUOTA_CHECK_INTERVAL_MS) return;
  lastStorageQuotaCheckAt = now;
  try {
    const localRatio = estimateLocalStorageBytes() / LOCAL_STORAGE_REFERENCE_BYTES;
    let originRatio = 0;
    if (navigator.storage && navigator.storage.estimate) {
      const { usage = 0, quota = 0 } = await navigator.storage.estimate();
      if (quota > 0) originRatio = usage / quota;
    }
    const ratio = Math.max(localRatio, originRatio);
    const previousWarning = storageQuotaWarning;
    const previousPercent = storageQuotaPercent;
    storageQuotaWarning = ratio >= STORAGE_QUOTA_WARN_RATIO;
    storageQuotaPercent = Math.max(0, Math.min(999, Math.round(ratio * 100)));
    if (storageQuotaWarning !== previousWarning || (storageQuotaWarning && storageQuotaPercent !== previousPercent)) render();
  } catch (_) { /* 참고용 경고이므로 실패해도 앱 동작은 유지 */ }
}
function scheduleStorageQuotaCheck(){
  clearTimeout(storageQuotaCheckTimer);
  storageQuotaCheckTimer = setTimeout(() => checkStorageQuota().catch(() => {}), 300);
}
function renderStorageQuotaBanner(){
  return `
    <div class="card" style="border-color:var(--midline);background:var(--midline-bg)">
      <p style="margin:0 0 8px;font-size:14px;color:var(--midline);font-weight:600">${tf('banner.storageQuotaTitle', { pct: storageQuotaPercent })}</p>
      <p class="muted" style="margin:0 0 12px">${t('banner.storageQuotaMsg')}</p>
    </div>`;
}

// ===== 백업 유도 배너 =====
// localStorage는 브라우저 데이터 정리(특히 iOS Safari의 장기 미방문 사이트 정리)로 사라질 수 있어,
// 마지막 백업(파일 저장 또는 드라이브 동기화)에서 일정 기간이 지나면 배너로 백업을 유도한다.
const BACKUP_META_KEY = STORAGE_KEY + '_backup_meta';
const BACKUP_NUDGE_AFTER_MS = 14 * 24 * 60 * 60 * 1000; // 마지막 백업 후 14일
const BACKUP_SNOOZE_MS = 7 * 24 * 60 * 60 * 1000;       // "나중에" 누르면 7일 숨김
let backupMeta = { lastBackupAt: 0, snoozeUntil: 0 };
function loadBackupMeta(){
  try {
    const raw = localStorage.getItem(BACKUP_META_KEY);
    if (raw) {
      const m = JSON.parse(raw);
      if (m && typeof m === 'object') {
        backupMeta.lastBackupAt = Number(m.lastBackupAt) || 0;
        backupMeta.snoozeUntil = Number(m.snoozeUntil) || 0;
      }
    }
  } catch (_) {}
  // 첫 실행이면 지금을 기준점으로 — 새로 시작한 사용자에게 곧바로 배너를 띄우지 않기 위함
  if (!backupMeta.lastBackupAt) { backupMeta.lastBackupAt = Date.now(); saveBackupMeta(); }
}
function saveBackupMeta(){
  try { localStorage.setItem(BACKUP_META_KEY, JSON.stringify(backupMeta)); } catch (_) {}
}
function markBackedUp(){
  backupMeta.lastBackupAt = Date.now();
  saveBackupMeta();
}
function shouldShowBackupNudge(){
  if (loadFailed || !projects.length) return false;
  const now = Date.now();
  if (now < backupMeta.snoozeUntil) return false;
  const lastSafe = Math.max(backupMeta.lastBackupAt, driveLastSyncedAt || 0);
  return now - lastSafe > BACKUP_NUDGE_AFTER_MS;
}
function renderBackupNudgeBanner(){
  if (!shouldShowBackupNudge()) return '';
  return `
    <div class="card" style="border-color:var(--midline);background:var(--midline-bg)">
      <p style="margin:0 0 8px;font-size:14px;color:var(--midline);font-weight:600">${t('banner.backupTitle')}</p>
      <p class="muted" style="margin:0 0 12px">${t('banner.backupMsg')}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="ghost small" id="btnBackupLater">${t('banner.backupLater')}</button>
        <button class="accent small" id="btnBackupNow">${t('banner.backupNow')}</button>
      </div>
    </div>`;
}

function isGoogleSignedIn(){
  return !!googleAccessToken && Date.now() < googleTokenExpiresAt;
}

function ensureDriveTokenClient(){
  if (driveTokenClient) return driveTokenClient;
  if (!window.google || !google.accounts || !google.accounts.oauth2) return null;
  driveTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: () => {} // requestAccessToken 호출마다 아래에서 그때그때 덮어씀
  });
  return driveTokenClient;
}

// 로그인 버튼 클릭 안에서 바로 호출해야 함(구글 로그인 창이 팝업이라, 버튼 클릭 이벤트 밖에서 부르면 브라우저가 막을 수 있음)
function signInGoogleDrive(){
  const client = ensureDriveTokenClient();
  if (!client) { showToast(t('sync.loadingSignIn')); return; }
  client.callback = (resp) => {
    if (!resp || resp.error) { showToast(t('sync.signInFailed')); return; }
    googleAccessToken = resp.access_token;
    googleTokenExpiresAt = Date.now() + (Number(resp.expires_in) || 3500) * 1000;
    render();
    syncWithDrive();
  };
  client.requestAccessToken({ prompt: '' });
}

async function driveFetch(url, options = {}){
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers || {}), Authorization: `Bearer ${googleAccessToken}` }
  });
  if (res.status === 401) { // 만료됨 — 토큰 비우고 재로그인 유도
    googleAccessToken = null; googleTokenExpiresAt = 0;
    const err = new Error('drive auth expired');
    err.isAuthExpired = true;
    throw err;
  }
  if (!res.ok) throw new Error('drive api ' + res.status);
  return res;
}

async function findDriveFile(){
  const res = await driveFetch(
    'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,modifiedTime)&q=' +
    encodeURIComponent(`name='${DRIVE_FILE_NAME}'`)
  );
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function downloadDriveFile(fileId){
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  return res.json();
}
async function uploadDriveFile(jsonObj, opts = {}){
  const body = JSON.stringify(jsonObj);
  // keepalive: 탭이 닫히는 중에도 요청이 유지되게 함(64KB 제한이 있어 큰 데이터는 일반 요청으로 폴백)
  const keepalive = !!opts.keepalive && body.length < 60000;
  if (driveFileId) {
    const res = await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media&fields=id,modifiedTime`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body,
      keepalive
    });
    const updated = await res.json();
    driveRemoteModifiedTime = updated.modifiedTime || driveRemoteModifiedTime;
    return updated.id;
  }
  const boundary = 'magamsyncboundary';
  const metadata = { name: DRIVE_FILE_NAME, parents: ['appDataFolder'] };
  const multipart =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${body}\r\n--${boundary}--`;
  const res = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime', {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body: multipart,
    keepalive
  });
  const created = await res.json();
  driveFileId = created.id;
  driveRemoteModifiedTime = created.modifiedTime || null;
  return created.id;
}

// 백업 버튼 전용 Google 저장.
// 일반 동기화처럼 원격 데이터를 자동으로 불러오지는 않고, 원격 변경이 있으면 덮어쓰기 여부만 확인한다.
async function backupCurrentToDrive(portableData){
  if (!isGoogleSignedIn()) return { ok:false, reason:'signedout' };
  if (!isLeaderTab) return { ok:false, reason:'notLeader' };
  if (!(await ensureLicenseVerified())) return { ok:false, reason:'license' };
  if (loadFailed || staleTabWarning) return { ok:false, reason:'blocked' };
  if (driveSyncBusy || driveConflictPending) return { ok:false, reason:'busy' };

  driveSyncBusy = true;
  render();
  try {
    const file = await findDriveFile();
    const localSavedAt = toSafeTimestamp(portableData && portableData.savedAt, lastChangedAt);
    if (!file) {
      await uploadDriveFile(portableData, { keepalive:true });
      markSynced(localSavedAt);
      return { ok:true };
    }

    driveFileId = file.id;
    driveRemoteModifiedTime = file.modifiedTime || driveRemoteModifiedTime;
    const remote = await downloadDriveFile(file.id);
    const remoteSavedAt = toSafeTimestamp(remote && remote.savedAt, 0);
    const sameData = JSON.stringify(stripPortableAssets(remote)) === JSON.stringify(stripPortableAssets(portableData));
    if (sameData) {
      markSynced(remoteSavedAt);
      return { ok:true, already:true };
    }

    const remoteChangedSinceLastSeen = lastSeenRemoteSavedAt !== null && remoteSavedAt !== lastSeenRemoteSavedAt;
    const remoteLooksNewer = remoteSavedAt > localSavedAt;
    if (remoteChangedSinceLastSeen || remoteLooksNewer) {
      driveConflictPending = true;
      const overwrite = await new Promise(resolve => {
        customConfirm(t('sync.bothChangedConfirm'), () => resolve(true), {
          confirmLabel:t('sync.overwriteBtn'),
          onCancel:() => resolve(false)
        });
      });
      driveConflictPending = false;
      if (!overwrite) {
        driveConflictDeclined = true;
        return { ok:false, cancelled:true };
      }
    }

    await uploadDriveFile(portableData, { keepalive:true });
    markSynced(localSavedAt);
    return { ok:true };
  } catch (err) {
    return { ok:false, error:err };
  } finally {
    driveConflictPending = false;
    driveSyncBusy = false;
    render();
  }
}

// 불러오기 버튼의 Google 선택 전용.
// 다운로드·검증 후 확인창을 띄우며, 적용 직전에 현재 상태를 복구용 스냅샷으로 저장한다.
async function loadBackupFromDrive(){
  if (!isLeaderTab) { showToast(t('sync.notLeaderBlockSync')); return; }
  if (!(await ensureLicenseVerified())) { showLicenseKeyModal(); return; }
  if (!isGoogleSignedIn()) { showToast(t('sync.sessionExpired')); return; }
  if (loadFailed) { showToast(t('sync.loadFailedBlockSync')); return; }
  if (staleTabWarning) { showToast(t('sync.staleTabBlockSync')); return; }
  if (driveSyncBusy || driveConflictPending) { showToast(t('sync.syncingNow')); return; }

  driveSyncBusy = true;
  render();
  try {
    const file = await findDriveFile();
    if (!file) { showToast(t('sync.noRemoteBackup')); return; }
    driveFileId = file.id;
    driveRemoteModifiedTime = file.modifiedTime || driveRemoteModifiedTime;
    const remote = await downloadDriveFile(file.id);
    const prepared = prepareLoadedData(remote, { rebaseDailyState:true });
    if (!prepared) { showToast(t('sync.invalidRemoteKeepCurrent')); return; }
    const remoteSavedAt = toSafeTimestamp(remote && remote.savedAt, 0);

    // 네트워크 작업은 끝났으므로 확인창을 기다리는 동안 동기화 중 표시는 해제한다.
    driveSyncBusy = false;
    driveConflictPending = true;
    render();
    customConfirm(t('sync.loadGoogleConfirm'), async () => {
      try {
        await applyPortableRestore(remote, prepared, { keepCurrentAsPrevious:true });
        view.screen = 'dash';
        view.projectId = null;
        markSynced(remoteSavedAt);
        render();
        showToast(t('sync.loadedFromDrive'));
      } catch (err) {
        showToast(t(err && err.i18nKey ? err.i18nKey : 'sync.loadFailedKeepCurrent'));
      } finally {
        driveConflictPending = false;
        render();
      }
    }, {
      confirmLabel:t('sync.loadBtn'),
      confirmClass:'accent small',
      onCancel:() => { driveConflictPending = false; render(); }
    });
  } catch (err) {
    showToast(err && err.isAuthExpired ? t('sync.sessionExpired') : t('sync.loadFailedKeepCurrent'));
  } finally {
    if (!driveConflictPending) {
      driveSyncBusy = false;
      render();
    }
  }
}

// 로그인 직후, 그리고 로그인된 상태에서 화면이 다시 보일 때(다른 앱 갔다 돌아옴)마다 호출.
// 드라이브에 파일이 없으면 지금 데이터로 새로 만들고, 있으면 내용을 비교해서
// 다른 기기 게 더 최신이면 확인창을 띄우고(불러오기 기능과 동일한 안전 절차), 이 기기가 더 최신이면 조용히 올린다.
async function syncWithDrive(opts = {}){
  const manual = !!opts.manual;
  if (!isGoogleSignedIn()) return;
  if (!isLeaderTab) { if (manual) showToast(t('sync.notLeaderBlockSync')); return; }
  if (!(await ensureLicenseVerified())) { if (manual) showLicenseKeyModal(); return; }
  // 손상 데이터를 사용자가 아직 확인/승인하지 않은 상태(loadFailed)에서는 수동 동기화도,
  // 최초 백업 생성(드라이브에 파일이 없을 때 지금 데이터를 올리는 경로도 이 함수 안에 있음)도 막는다.
  if (loadFailed) { if (manual) showToast(t('sync.loadFailedBlockSync')); return; }
  if (staleTabWarning) { if (manual) showToast(t('sync.staleTabBlockSync')); return; }
  if (driveSyncBusy || driveConflictPending) { if (manual) showToast(t('sync.syncingNow')); return; }
  driveSyncBusy = true; render();
  try {
    const file = await findDriveFile();
    if (!file) {
      await uploadDriveFile(await buildPortableData(), { keepalive: true });
      markSynced(lastChangedAt);
      showToast(t('sync.firstBackupDone'));
      return;
    }
    driveFileId = file.id;
    driveRemoteModifiedTime = file.modifiedTime || driveRemoteModifiedTime;
    const remote = await downloadDriveFile(file.id);
    const remoteSavedAt = toSafeTimestamp(remote && remote.savedAt, 0);
    if (JSON.stringify(stripPortableAssets(remote)) === lastPersistedJson) {
      markSynced(remoteSavedAt);
      if (manual) showToast(t('sync.alreadyCurrent'));
      return;
    }

    const localIsPristine = projects.length === 0 && stickers.length === 0 && lastChangedAt === 0;
    if (remoteSavedAt > lastChangedAt || localIsPristine) {
      const prepared = prepareLoadedData(remote, { rebaseDailyState: true });
      if (!prepared) {
        // 손상됐거나 더 새로운 형식인 원격 데이터는 동기화 성공으로 기록하지 않는다.
        showToast(t('sync.invalidRemoteKeepCurrent'));
        return;
      }
      const applyRemote = async () => {
        try {
          await applyPortableRestore(remote, prepared, { keepCurrentAsPrevious:true });
          view.screen = 'dash'; view.projectId = null;
          markSynced(remoteSavedAt);
          render();
          showToast(t('sync.loadedFromDrive'));
        } catch (err) {
          showToast(t(err && err.i18nKey ? err.i18nKey : 'sync.loadFailedKeepCurrent'));
        } finally {
          driveConflictPending = false;
        }
      };
      if (localIsPristine) {
        await applyRemote();
      } else {
        driveConflictPending = true;
        customConfirm(t('sync.newerRemoteConfirm'), applyRemote, {
          confirmLabel:t('sync.loadBtn'),
          confirmClass:'accent small',
          onCancel:() => { driveConflictPending = false; driveConflictDeclined = true; }
        });
      }
    } else {
      const remoteChangedSinceLastSeen =
        lastSeenRemoteSavedAt !== null && remoteSavedAt !== lastSeenRemoteSavedAt;
      const pushLocal = async () => {
        try {
          await uploadDriveFile(await buildPortableData(), { keepalive: true });
          markSynced(lastChangedAt);
          render();
          showToast(t('sync.syncedToDrive'));
        } catch (err) {
          showToast(t(err && err.i18nKey ? err.i18nKey : 'sync.syncFailed'));
        } finally {
          driveConflictPending = false;
        }
      };
      if (remoteChangedSinceLastSeen) {
        driveConflictPending = true;
        customConfirm(t('sync.bothChangedConfirm'), pushLocal, {
          confirmLabel:t('sync.overwriteBtn'),
          onCancel:() => { driveConflictPending = false; driveConflictDeclined = true; }
        });
      } else {
        await pushLocal();
      }
    }
  } catch (e) {
    showToast(e && e.isAuthExpired ? t('sync.sessionExpired') : (e && e.isStickerStorageError ? t(e.i18nKey || 'sticker.storageReadFail') : t('sync.syncFailed')));
  } finally {
    driveSyncBusy = false; render();
  }
}

// 데이터가 바뀔 때마다(디바운스) 조용히 드라이브에 올림. saveLocal()이 실제로 저장했을 때만 호출됨
async function pushToDriveNow(){
  if (driveSyncBusy || driveConflictPending || driveConflictDeclined || loadFailed || staleTabWarning || !isLeaderTab || !isGoogleSignedIn()) return;
  if (!(await ensureLicenseVerified())) return;
  driveSyncBusy = true;
  try {
    // 올리기 전에 파일 메타를 확인한다. 마지막으로 본 이후 다른 기기가 썼다면
    // 바로 덮어쓰지 않고 전체 동기화와 충돌 확인 절차로 전환한다.
    if (driveFileId && driveRemoteModifiedTime) {
      try {
        const metaRes = await driveFetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`);
        const meta = await metaRes.json();
        if (meta.modifiedTime && meta.modifiedTime !== driveRemoteModifiedTime) {
          driveSyncBusy = false;
          await syncWithDrive();
          return;
        }
      } catch (_) {
        // 원격 상태 확인 실패 — fail-closed: 확인하지 못한 채 덮어쓰지 않고, 다음 저장이나 수동 동기화 때 다시 시도
        driveConflictDeclined = true;
        driveSyncBusy = false;
        return;
      }
    }
    await uploadDriveFile(await buildPortableData(), { keepalive: true });
    markSynced(lastChangedAt);
  } catch (_) {
    // 조용히 실패 — 다음 저장 시점에 다시 시도됨. "구글 동기화" 버튼으로 언제든 수동 확인 가능.
  } finally {
    driveSyncBusy = false;
  }
}
function schedulePushToDrive(){
  if (!isLicenseUnlocked() || !isGoogleSignedIn()) return;
  clearTimeout(drivePushTimer);
  drivePushTimer = setTimeout(() => { drivePushTimer = null; pushToDriveNow(); }, 2000);
}
// 탭 종료 직전에는 원격 변경 확인을 생략한 강제 업로드를 하지 않는다.
// 2초 안에 페이지가 닫혀도 로컬 저장본은 다음 실행 시 안전하게 동기화된다.

// 불러온 프로젝트 배열 검증·정규화. 배열이 아니거나 필수 필드(id/name/deadline) 없으면 null 반환
const ALLOWED_UNITS = ['컷', '장', '개', ''];
const SAFE_ID_RE = /^id(\d+)$/;
function safeIdNumber(id){
  if (typeof id !== 'string') return null;
  const match = SAFE_ID_RE.exec(id);
  if (!match) return null;
  const n = Number(match[1]);
  return Number.isSafeInteger(n) && n >= 1 && n < Number.MAX_SAFE_INTEGER ? n : null;
}
function ensureSafeUniqueId(o, seenIds){
  if (safeIdNumber(o.id) === null || seenIds.has(o.id)) {
    let candidate = uid();
    while (seenIds.has(candidate)) candidate = uid();
    o.id = candidate;
  }
  seenIds.add(o.id);
}

function sanitizeProjects(arr){
  if (!Array.isArray(arr)) {
    lastLoadStats = { inputCount:0, keptCount:0, invalidProjects:0, clearedSegments:0 };
    return null;
  }
  const clean = [];
  const stats = { inputCount: arr.length, keptCount: 0, invalidProjects: 0, clearedSegments: 0 };
  const seenIds = new Set();
  for (const p of arr) {
    if (!p || typeof p !== 'object') { stats.invalidProjects++; continue; }
    if (!p.id || !p.name || !p.deadline) { stats.invalidProjects++; continue; }
    // id는 항상 화면에 data-* 속성 등으로 그대로 삽입되므로, 백업 파일을 통해 임의 문자열이 들어오지 못하게
    // "idN" 형식인지/중복은 아닌지 검사하고 아니면 새로 발급한다. 정상적으로 이 앱이 저장한 백업은 항상 이 형식이라 영향 없음.
    ensureSafeUniqueId(p, seenIds);
    // 단위도 렌더링 시 이스케이프 없이 그대로 삽입되므로 정해진 값만 허용한다.
    if (typeof p.unit !== 'string' || !ALLOWED_UNITS.includes(p.unit)) p.unit = '';
    // 누락 가능 필드 기본값 보정
    if (!Array.isArray(p.segments)) p.segments = [];
    if (!Array.isArray(p.checklist)) p.checklist = [];
    if (!Array.isArray(p.restDays)) p.restDays = [];
    delete p.initialDailyAvg; // v1.7까지 저장되던 미사용 기준값 제거
    p.segments.forEach(s => {

    const remainingSegments = sorted.length - i;
    const remainingAmount = Math.max(project.total - assigned, 0);
    if (i === sorted.length - 1) {
      seg.amount = remainingAmount;
    } else {
      const scaled = oldTotal > 0 ? Math.round((Number(seg.amount) || 1) * (project.total / oldTotal)) : Number(seg.amount) || 1;
      seg.amount = Math.max(1, Math.min(scaled, remainingAmount - (remainingSegments - 1)));
    }
    assigned += seg.amount;
  });
  return normalizeSegmentStructure(project);
}

function allocatePositiveDays(totalDays, weights){
  const count = weights.length;
  if (!count || totalDays < count) return null;
  const clean = weights.map(v => Math.max(1, toSafePositiveInt(v)));
  const totalWeight = clean.reduce((a,b)=>a+b,0);
  const remaining = totalDays - count;
  const rawExtras = clean.map(w => remaining * w / totalWeight);
  const days = rawExtras.map(v => 1 + Math.floor(v));
  let left = totalDays - days.reduce((a,b)=>a+b,0);
  const order = rawExtras.map((v,i)=>({i, frac:v-Math.floor(v)}))
    .sort((a,b)=> b.frac-a.frac || a.i-b.i);
  for (let i=0; i<left; i++) days[order[i % order.length].i]++;
  return days;
}

// 정확한 작업량을 원본으로 사용하고 날짜만 작업 가능일 비율에 맞춰 배치한다.
function assignSegmentDatesByAmounts(project, segments, startDate = project.startDate){
  if (!segments || segments.length < 2) return false;
  const workable = projectWorkableDates(project, startDate, project.deadline);
  if (workable.length < segments.length) return false;
  const dayAlloc = allocatePositiveDays(workable.length, segments.map(seg => seg.amount));
  if (!dayAlloc) return false;
  let dayCursor = 0;
  segments.forEach((seg, i) => {
    seg.planStartDate = workable[dayCursor];
    dayCursor += dayAlloc[i];
    seg.deadline = i === segments.length - 1 ? project.deadline : workable[dayCursor - 1];
  });
  return true;
}

function bulkCreateSegments(project, rows, opts = {}){
  const oldById = new Map((project.segments || []).map(seg => [seg.id, seg]));
  const nextSegments = rows.map((row, i) => {
    const old = row.id ? oldById.get(row.id) : null;
    return {
      id: row.id || uid(),
      name: row.name || defaultSegmentName(i),
      amount: toSafePositiveInt(row.amount),
      deadline: project.deadline,
      planStartDate: project.startDate,
      done: old ? toSafeNonNegativeInt(old.done) : 0
    };
  });
  if (nextSegments.reduce((sum, seg) => sum + seg.amount, 0) !== project.total) return false;
  if (!assignSegmentDatesByAmounts(project, nextSegments, opts.startDate || project.startDate)) return false;
  project.segments = nextSegments;
  reconcileChecklistAssignments(project);
  applySpillover(project);
  return true;
}

function reallocateExistingSegmentDates(project){
  const sorted = sortSegments(project);
  if (!sorted.length) return true;
  return assignSegmentDatesByAmounts(project, sorted);
}

// 프로젝트 기간·작업일 설정이 바뀌면 고정된 구간 작업량은 유지하고,
// 각 구간 날짜만 새 작업 가능일에 맞춰 다시 배치한다.
function reallocateSegmentsForPlanChange(project){
  if (!project || !project.segments || !project.segments.length) return '';
  if (!reallocateExistingSegmentDates(project)) return t('err.newScheduleNotEnoughWorkdays');
  const err = validateSegmentStructure(project);
  if (err) return err;
  applySpillover(project);
  return '';
}

function restoreProjectSnapshot(project, snapshot){
  Object.keys(project).forEach(key => delete project[key]);
  Object.assign(project, cloneJsonValue(snapshot));
  applySpillover(project);
}

// 달력에서 이동할 때 시작/마감은 같은 일수만큼 이동하고, 수동 쉬는 날은 실제 날짜로 유지한다.
// 작업 구간 날짜는 정확한 작업량 비율과 새 작업 가능일을 기준으로 다시 배치한다.
function shiftProjectSchedule(project, deltaDays){
  if (!project || !Number.isInteger(deltaDays) || deltaDays === 0) return '';
  const snapshot = cloneJsonValue(project);
  project.startDate = addDaysStr(project.startDate, deltaDays);
  project.deadline = addDaysStr(project.deadline, deltaDays);
  const planError = validatePlanDatesForWork(project, { hasTotal: !isDdayProject(project) });
  if (planError) { restoreProjectSnapshot(project, snapshot); return planError; }
  if (project.segments && project.segments.length) {
    if (!reallocateExistingSegmentDates(project)) {
      restoreProjectSnapshot(project, snapshot);
      return t('err.thisPositionNotEnoughWorkdays');
    }
    const segError = validateSegmentStructure(project);
    if (segError) { restoreProjectSnapshot(project, snapshot); return segError; }
  }
  recomputeDone(project);
  resetTodayTarget(project.id);
  return '';
}

function applySpillover(project){
  if (!project.segments.length) return;
  const sorted = project.segments.slice().sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));
  let remaining = project.done;
  sorted.forEach(s => {
    const fill = Math.min(remaining, s.amount);
    s.done = fill;
    remaining -= fill;
  });
}

function deleteSegment(project, segId){
  const previousAssignments = new Map((project.checklist || []).map(i => [i.id, i.segmentId]));
  const sorted = sortSegments(project);
  const idx = sorted.findIndex(s => s.id === segId);
  if (idx === -1) return 0;
  const [removed] = sorted.splice(idx, 1);
  if (sorted.length) {
    const mergeTarget = sorted[Math.min(idx, sorted.length - 1)]; // 다음 구간 우선, 마지막 삭제면 이전 구간
    mergeTarget.amount = (Number(mergeTarget.amount) || 0) + (Number(removed.amount) || 0);
    if (idx === 0 && removed.planStartDate) mergeTarget.planStartDate = removed.planStartDate;
  }
  project.segments = sorted;
  if (project.segments.length <= 1) {
    project.segments = [];
    reconcileChecklistAssignments(project);
    applySpillover(project);
  } else {
    normalizeSegmentStructure(project, { refreshPlanStarts: true, baseStart: 'currentPlan' });
  }
  return (project.checklist || []).filter(i => previousAssignments.get(i.id) && !i.segmentId).length;
}

// 활성 구간: 마감이 가장 가까운 미완료 구간. 없으면 null(=프로젝트 전체가 활성)
function getActiveSegment(project){
  const incomplete = project.segments.filter(s => s.done < s.amount);
  if (incomplete.length === 0) return null;
  return incomplete.sort((a,b) => new Date(a.deadline) - new Date(b.deadline))[0];
}

// ===== 계산 · 위험도 / 오늘 목표 / 연속일수 =====
function riskFromRatio(perDay, baseline, days){
  if (days < 0) return 'over';
  if (days <= 0) return 'danger';
  if (perDay <= baseline * RELAXED_RATIO) return 'relaxed';
  if (perDay <= baseline * DANGER_RATIO) return 'neutral';
  return 'danger';
}

// 작업 구간 라벨은 화면에 표시되는 올림 하루량끼리 비교한다.
// 현재 필요량이 계획 당시 필요량보다 작으면 여유, 같으면 진행중, 크면 위험이다.
function segmentRiskFromDailyQuota(perDay, baseline, days){
  if (days < 0) return 'over';
  if (days <= 0) return 'danger';
  const currentQuota = Math.ceil(Math.max(Number(perDay) || 0, 0));
  const plannedQuota = Math.ceil(Math.max(Number(baseline) || 0, 0));
  if (currentQuota < plannedQuota) return 'relaxed';
  if (currentQuota === plannedQuota) return 'neutral';
  return 'danger';
}

// 프로젝트 전체 위험도 (대시보드/목록/헤더 배지에 항상 이걸 씀 — 구간과 무관)
function calcProjectRisk(project){
  if (isDdayProject(project)) {
    const days = daysBetween(todayStr(), project.deadline);
    const badgeVariant = days < 0 ? 'over' : days === 0 ? 'deadline' : 'dday';
    const ddayLabel = days < 0 ? t('status.overdue') : days === 0 ? t('status.deadline') : 'D-'+days;
    return { risk: 'dday', days, ddayLabel, badgeVariant };
  }
  const pct = project.total > 0 ? Math.round((project.done / project.total) * 100) : 0;
  if (project.total > 0 && project.done >= project.total) {
    return { risk: 'done', days: 0, perDay: 0, overdue: false, isDeadlineDay: false, remaining: 0, pct };
  }
  if (notStartedYet(project)) {
    const startsIn = daysBetween(todayStr(), project.startDate);
    return {
      risk: 'notstarted',
      startsIn,
      notStartedLabel: currentLang === 'en'
        ? `Starts in ${startsIn} ${startsIn === 1 ? 'day' : 'days'}`
        : tf('dash.startDday', { n: startsIn })
    };
  }
  const remaining = project.total - project.done;
  const today = todayStr();
  const overdue = today > project.deadline;
  const isDeadlineDay = today === project.deadline;
  const days = projectWorkableDays(project, today, project.deadline);
  const perDay = (overdue || isDeadlineDay) ? remaining : remaining / Math.max(days,1);
  const baseline = currentScheduleDailyAvg(project) || 1;
  const risk = overdue ? 'over' : isDeadlineDay ? 'deadline' : riskFromRatio(perDay, baseline, days);
  return { risk, days, perDay: Math.max(perDay,0), overdue, isDeadlineDay, remaining, pct };
}

// 구간 개별 위험도 + 지연 태그 (상세화면 구간 목록에만 표시)
function calcSegmentRisk(project, seg){
  const remaining = seg.amount - seg.done;
  if (remaining <= 0) return { risk:'done', days:0, perDay:0, overdue:false, isDeadlineDay:false, isActive:false };
  const today = todayStr();
  const overdue = today > seg.deadline;
  const isDeadlineDay = today === seg.deadline;
  const days = projectWorkableDays(project, today, seg.deadline);
  const perDay = (overdue || isDeadlineDay) ? remaining : remaining / Math.max(days,1);
  const baselineDays = Math.max(projectWorkableDays(project, seg.planStartDate, seg.deadline), 1);
  const baseline = seg.amount / baselineDays;
  const risk = overdue ? 'over' : isDeadlineDay ? 'deadline' : segmentRiskFromDailyQuota(perDay, baseline, days);
  const active = getActiveSegment(project);
  const isActive = active && active.id === seg.id;
  return { risk, days, perDay: Math.max(perDay,0), overdue, isDeadlineDay, isActive };
}

// B: 남은날 기준 평균치 — 활성 구간 기준, 올림 처리.
// 오늘 목표를 이미 채웠다면 오늘을 다시 남은 작업일에 포함하지 않고 다음 작업일부터 계산한다.
function calcLiveDailyAvg(project){
  const seg = getActiveSegment(project);
  const target = seg || { amount: project.total, done: project.done, deadline: project.deadline };
  const remaining = target.amount - target.done;
  const today = todayStr();
  const overdue = today > target.deadline;
  const isDeadlineDay = today === target.deadline;
  const fixedTodayTarget = dailyState && dailyState.startTargetMap
    ? Number(dailyState.startTargetMap[project.id])
    : NaN;
  const todayProgress = getTodayProgress(project);
  const targetMetToday = Number.isFinite(fixedTodayTarget)
    && fixedTodayTarget > 0
    && todayProgress >= fixedTodayTarget;
  const averageStart = targetMetToday && !overdue && !isDeadlineDay
    ? addDaysStr(today, 1)
    : today;
  const days = projectWorkableDays(project, averageStart, target.deadline);
  const perDay = (overdue || isDeadlineDay) ? remaining : remaining / Math.max(days,1);
  return { seg, perDay: Math.ceil(Math.max(perDay,0)), overdue, isDeadlineDay };
}

// A: 오늘 목표량 — 하루 시작 시점에 한 번 고정, dailyState.startTargetMap에 저장(캐시)
// 계획(작업량/마감일/시작일/포함옵션)이 바뀌면 resetTodayTarget()으로 캐시를 지워 다시 고정함
function getTodayTarget(project){
  if (isDdayProject(project) || notStartedYet(project) || !isWorkableToday(project)) return null;
  if (!(project.id in dailyState.startTargetMap)) {
    dailyState.startTargetMap[project.id] = calcLiveDailyAvg(project).perDay;
  }
  return dailyState.startTargetMap[project.id];
}
// 오늘 실제로 진행한 양 — 하루 시작 시점 완료량(startDoneMap) 대비 지금 완료량 차이
function getTodayProgress(project){
  const snap = dailyState.startDoneMap[project.id] ?? 0;
  return Math.max(project.done - snap, 0);
}

// 대시보드/상세에 표시할 "오늘 해야 할 양"
// todayTarget/todayRemaining = A(고정, 직접완료 입력과 1:1로 줄어듦) · perDay = B(남은날 기준 평균, 매번 재계산)
function calcTodayDisplay(project){
  if (isDdayProject(project)) return null;
  if (notStartedYet(project)) return null;
  const live = calcLiveDailyAvg(project);
  const workableToday = isWorkableToday(project);
  const todayTarget = getTodayTarget(project);
  const todayProgress = getTodayProgress(project);
  const todayRemaining = todayTarget !== null ? Math.max(todayTarget - todayProgress, 0) : null;
  return { seg: live.seg, perDay: live.perDay, overdue: live.overdue, isDeadlineDay: live.isDeadlineDay, workableToday, todayTarget, todayProgress, todayRemaining };
}


function riskLabel(key){
  const map = { done:'status.done', relaxed:'status.relaxed', neutral:'status.inprogress', danger:'status.danger', over:'status.overdue', deadline:'status.deadline', dday:'D-DAY' };
  return map[key] === 'D-DAY' ? 'D-DAY' : t(map[key]);
}

// 오늘 목표 게이지바: 새 목표를 잡을 때는 현재 미완료·작업 가능 프로젝트만 대상으로 삼는다.
// 단, 이미 오늘 목표가 잡힌 프로젝트는 오늘 완료되거나 일정이 바뀌어도 자정까지 추적 대상에 남긴다.
function activeGoalProjects(dateStr){
  return projects.filter(p => !isDdayProject(p) && isWorkableDate(p, dateStr) && p.done < p.total);
}
function hasWorkableProjects(dateStr){
  return projects.some(p => isWorkableDate(p, dateStr) && p.done < p.total);
}
function hasOwn(obj, key){
  return !!obj && Object.prototype.hasOwnProperty.call(obj, key);
}
// 삭제·작업량 제거처럼 프로젝트의 현재 완료량을 더는 읽을 수 없게 되기 전에
// 오늘 목표와 진행량을 별도 보관한다. 프로젝트별로 저장해 중복 합산을 막는다.
function bankProjectTodayContribution(p){
  if (!p || !dailyState || dailyState.date !== todayStr()) return;
  const target = dailyState.startTargetMap && dailyState.startTargetMap[p.id];
  if (target === undefined) return;
  const progress = getTodayProgress(p);
  if (!dailyState.bankedGoalMapToday || typeof dailyState.bankedGoalMapToday !== 'object') dailyState.bankedGoalMapToday = {};
  const prev = dailyState.bankedGoalMapToday[p.id];
  dailyState.bankedGoalMapToday[p.id] = {
    target: Math.max(Number(target) || 0, Number(prev && prev.target) || 0),
    progress: Math.max(progress, Number(prev && prev.progress) || 0)
  };
  dailyState.hadWorkableToday = true;
  delete dailyState.startTargetMap[p.id];
  if (dailyState.startDoneMap) delete dailyState.startDoneMap[p.id];
}
// 계획이 바뀌었을 때 오늘 목표를 다시 계산한다.
// 이미 오늘 진행한 프로젝트가 완료됐거나 오늘 작업 대상에서 빠졌다면 기존 목표는 유지해 기록이 사라지지 않게 한다.
function resetTodayTarget(projectId){
  if (!dailyState || !dailyState.startTargetMap || !hasOwn(dailyState.startTargetMap, projectId)) return;
  const p = projects.find(x => x.id === projectId);
  const progress = p ? getTodayProgress(p) : 0;
  const stillEligible = !!p && !isDdayProject(p) && isWorkableDate(p, todayStr()) && p.done < p.total;
  if (progress > 0 && !stillEligible) return;
  delete dailyState.startTargetMap[projectId];
}
// 프로젝트를 지우기 전에는 bankProjectTodayContribution()으로 오늘 기여도를 보존한다.
function snapshotDoneMap(){
  const map = {};
  projects.forEach(p => map[p.id] = p.done);
  return map;
}
// 현재 dailyState가 추적 중인 프로젝트들의 오늘 진행량 합.
// 완료되거나 일정이 바뀐 프로젝트도 startTargetMap에 남아 있으므로 포함된다.
function rawProgressSince(snapshotMap){
  let sum = 0;
  const targetMap = dailyState && dailyState.startTargetMap && typeof dailyState.startTargetMap === 'object'
    ? dailyState.startTargetMap : {};
  Object.keys(targetMap).forEach(id => {
    const p = projects.find(x => x.id === id);
    if (p) sum += Math.max(p.done - (snapshotMap[id] ?? 0), 0);
  });
  const banked = dailyState && dailyState.bankedGoalMapToday && typeof dailyState.bankedGoalMapToday === 'object'
    ? dailyState.bankedGoalMapToday : {};
  Object.values(banked).forEach(v => { sum += Math.max(Number(v && v.progress) || 0, 0); });
  return sum;
}
// 오늘 시점 활성 프로젝트들의 "오늘 목표량"을 한 번 계산해 고정용으로 저장
function snapshotTargetMap(){
  const map = {};
  activeGoalProjects(todayStr()).forEach(p => {
    map[p.id] = calcLiveDailyAvg(p).perDay;
  });
  return map;
}
function normalizeDailyStateAfterLoad(opts = {}){
  const t = todayStr();
  if (!dailyState || typeof dailyState !== 'object') dailyState = { date: t, streak: 0, startDoneMap: {}, startTargetMap: {}, bankedGoalMapToday: {}, hadWorkableToday: false };
  delete dailyState.bankedProgressToday; // 구버전 단일 합계는 프로젝트별 보존 지도에 대체됨
  if (typeof dailyState.streak !== 'number' || !Number.isFinite(dailyState.streak)) dailyState.streak = 0;
  if (!dailyState.bankedGoalMapToday || typeof dailyState.bankedGoalMapToday !== 'object' || Array.isArray(dailyState.bankedGoalMapToday)) dailyState.bankedGoalMapToday = {};
  Object.keys(dailyState.bankedGoalMapToday).forEach(id => {
    const v = dailyState.bankedGoalMapToday[id];
    if (!v || typeof v !== 'object') { delete dailyState.bankedGoalMapToday[id]; return; }
    v.target = Math.max(Number(v.target) || 0, 0);
    v.progress = Math.max(Number(v.progress) || 0, 0);
  });
  if (typeof dailyState.hadWorkableToday !== 'boolean') dailyState.hadWorkableToday = false;
  const validDate = typeof dailyState.date === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(dailyState.date);
  if (!validDate) dailyState.date = t;

  // 백업 불러오기는 그 순간의 완료량을 오늘 시작점으로 다시 잡는다.
  // 그렇지 않으면 백업에 이미 있던 완료량을 '오늘 한 작업'으로 오해해서 게이지가 오염된다.
  if (opts.rebase) {
    // 백업 날짜가 오늘이 아니면(=그 사이 공백이 있었는지 알 수 없으면) 스트릭도 같이 초기화한다.
    if (dailyState.date !== t) dailyState.streak = 0;
    dailyState.date = t;
    dailyState.startDoneMap = snapshotDoneMap();
    dailyState.startTargetMap = snapshotTargetMap();
    dailyState.bankedGoalMapToday = {};
    dailyState.hadWorkableToday = false;
    return;
  }

  if (!dailyState.startDoneMap || typeof dailyState.startDoneMap !== 'object') dailyState.startDoneMap = snapshotDoneMap();
  projects.forEach(p => {
    if (!(p.id in dailyState.startDoneMap)) dailyState.startDoneMap[p.id] = p.done;
  });
  Object.keys(dailyState.startDoneMap).forEach(id => {
    if (!projects.some(p => p.id === id) && !hasOwn(dailyState.bankedGoalMapToday, id)) delete dailyState.startDoneMap[id];
  });

  if (!dailyState.startTargetMap || typeof dailyState.startTargetMap !== 'object') dailyState.startTargetMap = {};
  Object.keys(dailyState.startTargetMap).forEach(id => {
    if (!projects.some(p => p.id === id)) delete dailyState.startTargetMap[id];
  });
}
function hasWorkableProjectsBetweenExclusive(startDate, endDate){
  let d = toDateOnly(startDate);
  const end = toDateOnly(endDate);
  d.setDate(d.getDate()+1);
  for (; d < end; d.setDate(d.getDate()+1)) {
    if (hasWorkableProjects(fmtLocalDate(d))) return true;
  }
  return false;
}
function rolloverDailyStateIfNeeded(){
  const t = todayStr();
  if (dailyState.date === t) return false;
  const gapDays = daysBetween(dailyState.date, t);
  // 전날 실제로 고정된 목표가 있었는지를 저장된 지도에서 판정한다.
  // 완료·삭제·일정 변경 후의 현재 프로젝트 상태로 과거를 다시 계산하지 않는다.
  const hadTrackedTargets = Object.keys(dailyState.startTargetMap || {}).length > 0
    || Object.keys(dailyState.bankedGoalMapToday || {}).length > 0;
  const hadWorkableProjects = hadTrackedTargets || dailyState.hadWorkableToday;
  const progressedLastStoredDay = rawProgressSince(dailyState.startDoneMap) > 0;

  if (gapDays === 1) {
    dailyState.streak = hadWorkableProjects ? (progressedLastStoredDay ? dailyState.streak + 1 : 0) : dailyState.streak;
  } else if (gapDays > 1) {
    const skippedWorkableDay = hasWorkableProjectsBetweenExclusive(dailyState.date, t);
    if (skippedWorkableDay) {
      dailyState.streak = 0;
    } else {
      dailyState.streak = hadWorkableProjects ? (progressedLastStoredDay ? dailyState.streak + 1 : 0) : dailyState.streak;
    }
  } else {
    dailyState.streak = 0;
  }

  dailyState.date = t;
  dailyState.startDoneMap = snapshotDoneMap();
  dailyState.startTargetMap = snapshotTargetMap();
  dailyState.bankedGoalMapToday = {};
  dailyState.hadWorkableToday = false;
  return true;
}
function computeTodayGoal(){
  const t = todayStr();
  // 오늘 새로 활성화된 프로젝트는 여기서 목표를 고정한다.
  activeGoalProjects(t).forEach(p => { getTodayTarget(p); });

  const contributions = new Map();
  Object.entries(dailyState.bankedGoalMapToday || {}).forEach(([id, v]) => {
    contributions.set(id, {
      target: Math.max(Number(v && v.target) || 0, 0),
      progress: Math.max(Number(v && v.progress) || 0, 0)
    });
  });
  Object.entries(dailyState.startTargetMap || {}).forEach(([id, target]) => {
    const p = projects.find(x => x.id === id);
    if (!p) return;
    const prev = contributions.get(id) || { target: 0, progress: 0 };
    prev.target += Math.max(Number(target) || 0, 0);
    prev.progress += getTodayProgress(p);
    contributions.set(id, prev);
  });

  if (contributions.size > 0) dailyState.hadWorkableToday = true;
  // 오늘 목표 달성률 = 프로젝트별 오늘 목표량으로 가중평균.
  // 목표량(분모) 합 대비 진행량 합이라, 목표가 큰 프로젝트가 그만큼 더 크게 반영된다.
  // 프로젝트별로 진행량을 자기 목표까지만 세어(초과분 버림) 한 프로젝트의 초과가 다른 프로젝트의 부족을 못 덮게 한다.
  let targetSum = 0, cappedProgressSum = 0, progressSum = 0;
  contributions.forEach(v => {
    const t = Math.max(Number(v.target) || 0, 0);
    const pr = Math.max(Number(v.progress) || 0, 0);
    targetSum += t;
    cappedProgressSum += Math.min(pr, t);
    progressSum += pr;
  });
  const pct = targetSum > 0 ? Math.round(cappedProgressSum / targetSum * 100) : 0;
  const streak = dailyState.streak + (progressSum > 0 ? 1 : 0);
  return { pct, streak };
}
function todayGoalMessage(pct){
  if (pct >= 100) return t('dash.msg.achieved');
  if (pct >= 70) return t('dash.msg.almost');
  if (pct >= 40) return t('dash.msg.halfway');
  if (pct > 0) return t('dash.msg.goodStart');
  return t('dash.msg.startToday');
}
function renderTodayGoalBar(){
  const goal = computeTodayGoal();
  return `

}

const RISK_HEX = { done:'#12735c', relaxed:'#12735c', neutral:'#5a6472', danger:'#a5333a', over:'#7a2029', deadline:'#7a2029', dday:'#3f4590', notstarted:'#5a6472' };

function hexToRgba(hex, alpha){
  const n = parseInt(hex.slice(1),16);
  const r = (n>>16)&0xff, g = (n>>8)&0xff, b = n&0xff;
  return `rgba(${r},${g},${b},${alpha})`;
}

function ringSvg(pct, color){
  const r = 41, c = 46;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - pct / 100);
  return `<svg width="92" height="92" viewBox="0 0 92 92">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--border)" stroke-width="10"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
      stroke-dasharray="${circumference.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 ${c} ${c})"/>
  </svg>`;
}

function normalizeDraftWorkloadText(draft){
  if (typeof draft.workloadText === 'string') return draft.workloadText;
  if (Array.isArray(draft.workloadParts)) return draft.workloadParts.join('/');
  return String(draft.total || '');
}
function parseWorkloadText(raw){
  const text = String(raw ?? '').trim().replace(/／/g, '/');
  if (!text) return { ok:true, amounts:[], total:null, normalized:'' };
  const pieces = text.split('/').map(piece => piece.trim());
  if (pieces.length > 6) return { ok:false, message:t('err.maxSegments6') };
  if (pieces.some(piece => !piece)) return { ok:false, message:t('err.workloadFormat') };
  if (pieces.some(piece => !/^\d+$/.test(piece) || !isPositiveIntegerValue(piece))) {
    return { ok:false, message:t('err.workloadPositiveInt') };
  }
  const amounts = pieces.map(Number);
  const total = amounts.reduce((sum, value) => sum + value, 0);
  if (!Number.isSafeInteger(total)) return { ok:false, message:t('err.workloadTooBig') };
  return { ok:true, amounts, total, normalized:amounts.join('/') };
}

let calEditingField = null; // null | 'start' | 'deadline' — 시작일/마감일 배지를 눌러서 "이동 모드"로 들어간 상태

function renderMiniCalendar(project){
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + calMonthOffset);
  const year = base.getFullYear();
  const month = base.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayS = todayStr();
  const midDeadlines = (project.segments || []).map(s => s.deadline);
  let cells = '';
  [t('dow.sun'),t('dow.mon'),t('dow.tue'),t('dow.wed'),t('dow.thu'),t('dow.fri'),t('dow.sat')].forEach(d => cells += `<div class="cal-cell dow">${d}</div>`);
  for (let i=0;i<firstDow;i++) cells += `<div class="cal-cell pad">.</div>`;
  for (let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dow = new Date(year, month, day).getDay();
    const isWeekendDay = dow === 0 || dow === 6;
    const rest = isRestDay(dateStr, project.restDays) || (isWeekendDay && !project.includeWeekend);
    const isToday = dateStr === todayS;
    const isDeadlineCell = dateStr === project.deadline;
    const isStartCell = dateStr === project.startDate;
    let markClass = '';
    if (isDeadlineCell) markClass = 'deadline-mark';
    else if (isStartCell) markClass = 'start-mark';
    else if (midDeadlines.includes(dateStr)) markClass = 'middeadline-mark';
    else if (rest) markClass = 'rest';
    const locked = markClass === 'middeadline-mark';
    const armedHl = calEditingField ? ' style="outline:2px dashed var(--accent);outline-offset:-2px"' : '';
    cells += `<div class="cal-cell ${markClass} ${isToday?'today-mark':''}" data-date="${dateStr}" ${locked?'data-locked="1"':''}${armedHl}>${day}</div>`;
  }
  const legend = `
    <div class="cal-legend">
      <span><span class="dot" style="background:var(--accent-bg);border:1px solid var(--accent)"></span>${t('minical.legend.start')}</span>
      <span><span class="dot" style="background:var(--midline-bg)"></span>${t('minical.legend.segment')}</span>
      <span><span class="dot" style="background:var(--danger-bg)"></span>${t('minical.legend.deadline')}</span>
      <span><span class="dot" style="background:#edeff2"></span>${t('minical.legend.rest')}</span>
    </div>`;
  const hint = calEditingField
    ? `<p class="cal-hint" style="color:var(--accent)">${t('minical.editHintPrefix')} ${calEditingField === 'start' ? t('cal.changeStart') : t('cal.changeDeadline')} ${t('minical.editHint')}</p>`
    : `<p class="cal-hint">${t('minical.hint')}</p>`;
  const periodChecks = `
    <div class="checkbox-row" style="margin-top:8px;margin-bottom:0">
      <label><input type="checkbox" id="d_today" ${project.includeToday?'checked':''} /> ${t('form.includeStart')}</label>
      <label><input type="checkbox" id="d_deadline_inc" ${project.includeDeadline?'checked':''} /> ${t('form.includeDeadline')}</label>
      <label><input type="checkbox" id="d_weekend" ${project.includeWeekend?'checked':''} /> ${t('form.includeWeekend')}</label>
    </div>`;
  return `
    <div class="cal-nav">
      <button id="calPrev">‹</button>
      <span>${deadlineViewerMonthTitle(year, month)}</span>
      <button id="calNext">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${legend}
    ${hint}
    ${periodChecks}
  `;
}

let projectEditOpenState = {}; // projectId -> bool
let projectEditDraftState = {}; // projectId -> 저장 전 편집폼 임시값(렌더가 다시 돌아도 입력값 유지)
let bulkFormOpenState = {}; // projectId -> bool, 작업 구간 생성/재지정 슬라이더 폼 펼침 상태
let editingSegNameId = null; // 더블클릭으로 이름 수정 중인 작업 구간 id
let editingChecklistItemId = null; // 더블클릭으로 수정 중인 체크리스트 항목 id
let editPeriodState = { today: true, deadline_inc: true, weekend: true };

function captureProjectEditDraft(){
  if (view.screen !== 'detail' || !view.projectId || !projectEditOpenState[view.projectId]) return;
  const nameEl = document.getElementById('e_name');
  const totalEl = document.getElementById('e_total');
  const unitEl = document.getElementById('e_unit');
  const startEl = document.getElementById('e_start');
  const deadlineEl = document.getElementById('e_deadline');
  if (!nameEl || !totalEl || !unitEl || !startEl || !deadlineEl) return;
  projectEditDraftState[view.projectId] = {
    name: nameEl.value,
    total: totalEl.value,
    unit: unitEl.value,
    startDate: startEl.value,
    deadline: deadlineEl.value,
    today: !!editPeriodState.today,
    deadline_inc: !!editPeriodState.deadline_inc,
    weekend: !!editPeriodState.weekend
  };
}

function clearProjectEditDraft(projectId){
  delete projectEditDraftState[projectId];
}

function closeProjectEdit(projectId){
  if (!projectId) return;
  projectEditOpenState[projectId] = false;
  clearProjectEditDraft(projectId);
}

  const editName = draft ? draft.name : p.name;
  const editTotal = draft ? draft.total : (p.total !== null && p.total !== undefined ? p.total : '');
  const editUnit = draft ? draft.unit : p.unit;

    <div class="form-line2">

        <label>${t('form.start')}</label>
        <input id="e_start" type="date" value="${editStart}" class="num-right" />

      <div class="chip-row has-tooltip" style="margin:0">
        <span class="chip ${editPeriodState.today?'on':''}" data-eopt="today">${t('form.includeStart')}</span>
        <span class="chip ${editPeriodState.deadline_inc?'on':''}" data-eopt="deadline_inc">${t('form.includeDeadline')}</span>

        <span class="tooltip-bubble">${t('form.periodTooltip')}</span>

      <button class="accent" id="saveProjectEditBtn">${t('form.save')}</button>

function renderDetail(id){
  const p = projects.find(x => x.id === id);
  if (!p) return `<p>${t('detail.notFound').replace(/<\/?p>/g,'')}</p>`;
  const pr = calcProjectRisk(p);
  const disp = calcTodayDisplay(p);
  const dday = isDdayProject(p);

  let todayLine = '';
  if (dday) {
    todayLine = `<p class="row" style="font-size:14px"><b>${t('detail.noAmount')}</b><strong>${pr.ddayLabel}</strong></p>`;
  } else if (pr.risk === 'done') {
    todayLine = `<p class="row" style="font-size:14px"><b>${t('detail.workDone')}</b><strong>${t('status.done')}</strong></p>`;
  } else if (pr.risk === 'notstarted') {
    todayLine = `<p style="font-size:14px">${tf('detail.startsOn', { date: p.startDate })}</p>`;
  } else {
    const todayLabel = disp.seg
      ? tf('detail.todayBySegment', { name: escapeHtml(disp.seg.name) })
      : t('dash.todayDone');
    const restToday = (!disp.workableToday && !disp.overdue && !disp.isDeadlineDay);
    const mainVal = restToday ? t('status.rest') : (disp.overdue ? t('status.overdue') : `${disp.todayRemaining ?? disp.perDay}${unitLabel(p.unit, disp.todayRemaining ?? disp.perDay)}`);
    const avgLine = restToday
      ? `${t('detail.nextWorkdayAvg')} ${disp.perDay}${unitLabel(p.unit, disp.perDay)}`
      : (disp.overdue || disp.isDeadlineDay ? '' : `${t('detail.remainingDaysAvg')} ${disp.perDay}${unitLabel(p.unit, disp.perDay)}`);
    todayLine = `
      <p class="row" style="font-size:14px"><b>${todayLabel}</b><strong>${mainVal}</strong></p>
      ${avgLine ? `<p class="muted" style="font-size:12px;text-align:right;margin:2px 0 0">${avgLine}</p>` : ''}
    `;
  }

  const qtySum = checklistQtySum(p);
  const manual = Number(p.manualDone) || 0;
  const canUseButtonMode = !dday && p.total <= 10;
  const doneInputMode = canUseButtonMode && doneInputModeState[p.id] === 'buttons' ? 'buttons' : 'number';
  const quickDoneButtons = (canUseButtonMode && doneInputMode === 'buttons') ? `
    <div class="quick-done-wrap">
      <div class="quick-done-grid">
        ${Array.from({length:p.total}, (_, i) => {
          const n = i + 1;
          const on = n <= manual;
          const current = n === manual;
          return `<button type="button" class="quick-done-btn ${on?'on':''} ${current?'current':''}" data-quick-done="${n}" aria-pressed="${current?'true':'false'}" title="${t('detail.setManualDoneTo').replace('{n}', n).replace('{unit}', escapeHtml(unitLabel(p.unit, n)))}">${n}</button>`;
        }).join('')}
      </div>
      <p class="quick-done-help">${t('detail.qtyClickHelp')}</p>
    </div>` : '';
  const doneInput = dday ? '' : `
    <div class="done-input-head">
      <span class="done-input-label">${t('detail.completedLabel')}</span>
      <div class="done-input-control">
        ${doneInputMode === 'number' ? `<input type="number" min="0" step="1" max="${p.total}" value="${manual}" id="totalDoneInput" class="num-right" style="width:56px;flex:0 0 auto" />` : ''}
        ${canUseButtonMode ? `<button type="button" class="done-mode-toggle" id="doneModeToggle">${doneInputMode === 'buttons' ? t('detail.numberInput') : t('detail.buttonView')}</button>` : ''}
      </div>
    </div>
    ${quickDoneButtons}
    ${qtySum > 0 ? `<p class="muted" style="font-size:12px;text-align:right;margin:4px 0 0">${t('detail.checklistSum')} ${qtySum}${unitLabel(p.unit, qtySum)} + ${t('detail.manualSum')} ${manual}${unitLabel(p.unit, manual)} = ${t('detail.completedSum')} ${p.done}${unitLabel(p.unit, p.done)}</p>` : ''}`;

  const badgeText = pr.risk === 'dday' ? pr.ddayLabel : pr.risk === 'notstarted' ? pr.notStartedLabel : riskLabel(pr.risk);
  const badgeClass = pr.risk === 'dday' ? pr.badgeVariant : pr.risk;

  let midlineSection = '';
  if (dday) {
    midlineSection = `
      <div class="subcard">
        <div class="row" style="align-items:center">
          <span class="has-tooltip">
            <strong style="font-size:14px">${t('detail.segCount')} (0${t('cl.countUnit')})</strong>
            <span class="tooltip-bubble">${t('detail.segTooltip')}</span>
          </span>
        </div>
        <p class="muted" style="font-size:12px">${t('detail.noAmountNoSeg')}</p>
      </div>`;
  } else {
    const canMakeMidline = midlineMaxAllowed(p) >= 2;
    const sliderOpen = !!bulkFormOpenState[p.id];
    if (sliderOpen && midlineFormProjectId !== p.id) initMidlineFormState(p);
    const sortedSegments = p.segments.slice().sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));
    const lastSegId = sortedSegments.length ? sortedSegments[sortedSegments.length-1].id : null;
    const segRows = sortedSegments.map(s => {
      const sr = calcSegmentRisk(p, s);
      const isDone = s.done >= s.amount;
      const isLastSeg = s.id === lastSegId;
      const todayPart = (sr.isActive && !sr.overdue) ? ` · ${t('dash.today')} ${sr.isDeadlineDay?t('status.deadline'):Math.ceil(sr.perDay)+unitLabel(p.unit, Math.ceil(sr.perDay))}` : '';
      const segChecklistOpen = segmentChecklistOpenState[s.id] !== false;
      const nameHtml = editingSegNameId === s.id
        ? `<input class="seg-name-input" value="${escapeHtml(s.name)}" data-segname="${s.id}" />`
        : `<button class="seg-collapse-arrow" data-seg-cl-toggle="${s.id}" aria-label="${escapeHtml(s.name)} ${t('detail.segNameEditAria')} ${segChecklistOpen ? t('cal.collapse') : t('detail.checklistExpand')}">${segChecklistOpen ? '▾' : '▸'}</button><span class="seg-name" data-dblclick-segname="${s.id}">${isDone?'✓ ':''}${escapeHtml(s.name)}</span><button class="seg-rename-btn" data-renameseg="${s.id}" aria-label="${escapeHtml(s.name)} ${t('detail.renameSeg')}" title="${t('detail.renameSeg')}"><svg xmlns="http://www.w3.org/2000/svg" height="13" width="13" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true"><path d="M200-200h57l391-391-57-57-391 391v57Zm-80 80v-170l528-527q12-11 26.5-17t30.5-6q16 0 31 6t26 18l55 56q12 11 17.5 26t5.5 30q0 16-5.5 30.5T817-647L290-120H120Zm640-584-56-56 56 56Zm-141 85-28-29 57 57-29-28Z"/></svg></button>`;
      const isEditingName = editingSegNameId === s.id;
      return `<div class="seg-row ${sr.isActive?'active':''} ${isDone?'done':''}">
        <div class="seg-row-top">
          <span class="seg-name-slot" style="${isEditingName ? 'flex:1;min-width:0;width:auto' : ''}">${nameHtml}</span>
          <span class="right-group">
            <span class="seg-meta">${t('detail.segDone')} ${s.done}/${s.amount}${unitLabel(p.unit, s.amount)}${todayPart}</span>

            <button class="seg-del-btn" data-delseg="${s.id}" aria-label="${escapeHtml(s.name)} ${t('menu.delete')}" title="${t('menu.delete')}"><svg xmlns="http://www.w3.org/2000/svg" height="17" width="17" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true"><path d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Z"/></svg></button>
          </span>
        </div>
        ${renderSegmentChecklist(p, s)}
      </div>`;
    }).join('');

    const emptyBlock = (!p.segments.length && !sliderOpen) ? `
      <p class="muted">${t('detail.noSegYet')}</p>
      <button class="ghost small" id="midlineEmptyCreateBtn">${t('detail.create')}</button>
    ` : '';

    const sliderBlock = sliderOpen ? `
      <div id="bulkFormWrap">${renderBulkForm()}</div>
      <button class="primary small" id="confirmBulkAdd" style="width:100%;margin:8px 0 12px">${t('detail.create')}</button>
    ` : '';

    midlineSection = `
      <div class="subcard">
        <div class="row" style="align-items:center">
          <span class="has-tooltip">
            <strong style="font-size:14px">${t('detail.segCount')} (${p.segments.length}${t('cl.countUnit')})</strong>
            <span class="tooltip-bubble">${t('detail.segTooltip')}</span>
          </span>
          ${p.segments.length ? `<span class="midline-header-actions">
            <button class="icon-btn" id="midlineDeleteAllBtn" style="font-size:16px;color:var(--danger)" aria-label="${t('detail.segmentDeleteAll')}" title="${t('detail.segmentDeleteAll')}">−</button>
            ${canMakeMidline ? `<button class="icon-btn midline-fold-arrow" id="midlineToggleBtn" aria-label="${sliderOpen?t('detail.segmentEditCollapse'):t('detail.segmentEditExpand')}" title="${sliderOpen?t('detail.segmentEditCollapse'):t('detail.segmentEditExpand')}">${sliderOpen?'▾':'▸'}</button>` : ''}
          </span>` : ''}
        </div>
        <div class="midline-help">${t('detail.midlineHelp')}</div>
        ${p.segments.length ? `${canMakeMidline ? sliderBlock : ''}${segRows}` : ''}
        ${!canMakeMidline ? `<p class="muted" style="font-size:12px">${t('detail.cannotMakeSegments')}</p>` : (p.segments.length ? '' : `${emptyBlock}${sliderBlock}`)}
      </div>`;
  }

  const calendarCard = `<div class="card cal-card detail-lower-card">${renderMiniCalendar(p)}</div>`;
  const checklistCard = `
    <div class="card detail-lower-card">
      <div class="row" style="align-items:center">
        <h2 style="margin:0">${t('detail.checklistTitle')}</h2>
        ${renderChecklistHeader(p)}
      </div>
      ${renderChecklistBody(p, p.unit)}
    </div>`;
  const calAndChecklist = `<div class="two-col">${calendarCard}${checklistCard}</div>`;

  return `
    <div class="detail-page">
      <button class="back-btn" id="backToList">&larr; ${t('detail.backToList')}</button>

          <div class="row detail-head" style="align-items:center">

              <button class="icon-btn" id="editProjectBtn" aria-label="${t('detail.editProject')}" title="${t('detail.edit')}" style="font-size:14px">✎</button>

            <div class="info-stat"><span class="lbl">${t('detail.done')}</span><span class="val">${dday ? '-' : p.done+unitLabel(p.unit, p.done)}</span></div>
            <div class="info-stat"><span class="lbl">${t('detail.remaining')}</span><span class="val">${dday ? '-' : (p.total-p.done)+unitLabel(p.unit, p.total-p.done)}</span></div>
          </div>
          <div id="projectEditWrap">${projectEditOpenState[p.id] ? renderProjectEditForm(p) : ''}</div>

        </div>

      ${midlineSection ? `<div class="card detail-segment-card">${midlineSection}</div>` : ''}
      ${calAndChecklist}

  `;
