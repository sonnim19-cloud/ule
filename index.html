// [이벤트 · 공통] 헤더(메인달력)·데이터복구 배너·상단 탭
function bindCommonEvents(){
  const mainCalendarBtn = document.getElementById('btnMainCalendar');
  if (mainCalendarBtn) mainCalendarBtn.onclick = () => {
    if (view.screen !== 'dash' && view.screen !== 'list') return;
    mainCalendarOpen = !mainCalendarOpen;
    if (!mainCalendarOpen) mainCalendarExpandedWeeks.clear();
    render();
  };
  const mainCalendarRoot = document.getElementById('mainCalendarRoot');
  if (mainCalendarRoot) renderDeadlineViewer(mainCalendarRoot, { mode:'main', readOnly:!isLeaderTab });
  const googleSyncBtn = document.getElementById('btnGoogleSync');
  if (googleSyncBtn) googleSyncBtn.onclick = () => {
    if (!isLeaderTab) { showToast(t('sync.notLeaderBlockSync')); return; }
    if (!isLicenseUnlocked()) { showLicenseKeyModal(); return; }
    if (!isGoogleSignedIn()) signInGoogleDrive();
    else syncWithDrive({ manual:true }); // 로그인된 상태에서 누르면 즉시 수동 동기화
  };
  const btnDownloadCorrupt = document.getElementById('btnDownloadCorrupt');
  if (btnDownloadCorrupt) btnDownloadCorrupt.onclick = () => {
    let raw = null;
    try { raw = localStorage.getItem(STORAGE_KEY + '_corrupt'); } catch (_) {}
    if (!raw) { showToast(t('err.originalDataNotFound')); return; }
    const blob = new Blob([raw], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${t('banner.corruptFilenamePrefix')}${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };
  const btnReloadStaleTab = document.getElementById('btnReloadStaleTab');
  if (btnReloadStaleTab) btnReloadStaleTab.onclick = () => location.reload();
  const btnTakeoverLeader = document.getElementById('btnTakeoverLeader');
  if (btnTakeoverLeader) btnTakeoverLeader.onclick = () => {
    if (!claimLeadership({ force:true })) { showToast(t('sync.notLeaderBlockSync')); return; }
    if (!reloadLatestLocalStateForTakeover()) {
      stopLeaderHeartbeat();
      isLeaderTab = false;
      try {
        const info = readLeaderInfo();
        if (info && info.id === TAB_ID) localStorage.removeItem(LEADER_KEY);
      } catch (_) {}
      startLeadershipMonitor();
      showToast(t('sync.loadFailedKeepCurrent'));
      render();
      return;
    }
    staleTabWarning = false;
    render();
  };
  const btnAckLoadFail = document.getElementById('btnAckLoadFail');
  if (btnAckLoadFail) btnAckLoadFail.onclick = () => {
    const isPartial = loadFailReason === 'partial';
    const message = isPartial
      ? t('banner.confirmPartial')
      : t('banner.confirmEmpty');
    customConfirm(message, () => {
      loadFailed = false;
      loadFailReason = '';
      lastPersistedJson = null;
      render();
    }, { confirmLabel:t('confirm.continueLabel'), confirmClass:'accent small' });
  };

  const undoRestoreBtn = document.getElementById('btnUndoRestore');
  if (undoRestoreBtn) {
    let hasPrevious = false;
    try { hasPrevious = !!localStorage.getItem(BEFORE_RESTORE_KEY); } catch (_) {}
    undoRestoreBtn.style.display = hasPrevious ? '' : 'none';
  }
  document.getElementById('tabDash').onclick = () => { closeProjectEdit(view.projectId); view.screen='dash'; render(); };
  document.getElementById('tabList').onclick = () => { closeProjectEdit(view.projectId); view.screen='list'; render(); };
}

// [이벤트 · 대시보드] 프로젝트 카드 클릭·드래그 재정렬·빈 카드
function bindDashboardEvents(){
  document.querySelectorAll('.vcard[data-id]').forEach(el => {
    el.onclick = () => {
      if (Date.now() < suppressProjectOpenUntil) return;
      view.screen='detail'; view.projectId = el.dataset.id; calMonthOffset = 0; calEditingField = null; render();
    };
    el.ondragstart = (e) => {
      el.classList.add('dragging');
      el.dataset.dragging = '1';
      if (e.dataTransfer) {
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', el.dataset.id); } catch (_) {}
      }
    };
    el.ondragend = () => {
      el.classList.remove('dragging');
      delete el.dataset.dragging;
      clearProjectDropMarks('.vcard[data-id]');
    };
    el.ondragover = (e) => {
      e.preventDefault();
      const draggedEl = document.querySelector('.vcard.dragging') || document.querySelector('[data-dragging="1"]');
      if (!draggedEl || draggedEl === el) return;
      const after = projectDropPlaceAfter(el, e.clientX, e.clientY, 'auto');
      clearProjectDropMarks('.vcard[data-id]');
      markProjectDropTarget(el, after, true);
      el.dataset.dropAfter = after ? '1' : '0';
    };
    el.ondragleave = (e) => {
      if (e.relatedTarget && el.contains(e.relatedTarget)) return;
      el.classList.remove('drag-before','drag-after');
      delete el.dataset.dropAfter;
    };
    el.ondrop = (e) => {
      e.preventDefault();
      const draggedEl = document.querySelector('.vcard.dragging') || document.querySelector('[data-dragging="1"]');
      const after = el.dataset.dropAfter === '1';
      clearProjectDropMarks('.vcard[data-id]');
      delete el.dataset.dropAfter;
      if (!draggedEl || draggedEl === el) return;
      if (moveProjectRelative(draggedEl.dataset.id, el.dataset.id, after)) render();
    };
  });
  bindTouchProjectReorder('.vcard[data-id]', { insertionLine:true, axis:'auto' });

  document.querySelectorAll('.vcard-empty[data-empty-slot]').forEach(el => {
    el.onclick = () => { view.screen='list'; render(); };
  });
}

// [이벤트 · 프로젝트 목록] 새 일정 폼·목록 카드(메뉴/복제/삭제/드래그 재정렬)
function bindListEvents(){
  document.querySelectorAll('.chip-row.has-tooltip .chip[data-opt]').forEach(chip => {
    chip.classList.toggle('on', periodOptState[chip.dataset.opt]);
    chip.onclick = () => {
      periodOptState[chip.dataset.opt] = !periodOptState[chip.dataset.opt];
      chip.classList.toggle('on', periodOptState[chip.dataset.opt]);
    };
  });

  const addBtn = document.getElementById('addProjectBtn');
  if (addBtn) addBtn.onclick = () => {
    const name = document.getElementById('f_name').value.trim();
    const startDate = document.getElementById('f_start').value || todayStr();
    const deadline = document.getElementById('f_deadline').value;
    rolloverDailyStateIfNeeded();
    const workloadParsed = parseWorkloadText(document.getElementById('f_workload').value);
    if (!name || !deadline) {
      if (!name) warnRequiredField(document.getElementById('f_name'), t('form.namePlaceholder'));
      if (!deadline) warnRequiredField(document.getElementById('f_deadline'), t('form.deadlinePlaceholder'));
      return;
    }
    if (!workloadParsed.ok) { showToast(workloadParsed.message); return; }
    const segmentAmounts = workloadParsed.amounts;
    const hasTotal = segmentAmounts.length > 0;
    const totalVal = hasTotal ? workloadParsed.total : '';
    const p = makeProject({
      name, startDate, deadline, total: hasTotal ? totalVal : '',
      unit: document.getElementById('f_unit').value,
      includeToday: periodOptState.f_today,
      includeDeadline: periodOptState.f_deadline_inc,
      includeWeekend: periodOptState.f_weekend
    });
    const planError = validatePlanDatesForWork(p, { hasTotal });
    if (planError) { showToast(planError); return; }
    if (segmentAmounts.length > 1) {
      const max = midlineMaxAllowed(p);
      if (segmentAmounts.length > max) { showToast(tf('err.maxSegmentsNCurrentSchedule', { n: max })); return; }
      const rows = segmentAmounts.map((amount, i) => ({ id:null, name:defaultSegmentName(i), amount }));
      if (!bulkCreateSegments(p, rows)) { showToast(t('err.cannotPlaceSegmentDates')); return; }
      const segmentError = validateSegmentStructure(p);
      if (segmentError) { showToast(segmentError); return; }
    }
    projects.push(p);
    periodOptState = { f_today: true, f_deadline_inc: true, f_weekend: true };
    clearNewProjectDraft();
    view.screen = 'detail'; view.projectId = p.id; calMonthOffset = 0; calEditingField = null;
    render();
  };

  document.querySelectorAll('[data-del-proj]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.delProj;
      const p = projects.find(x => x.id === id);
      if (!p) return;
      customConfirm(tf('confirm.deleteProjectConfirm', { name: p.name }), async () => {
        if (view.projectId === id) closeProjectEdit(id);
        bankProjectTodayContribution(p);
        await removeStickersForView('detail:' + id);
        projects = projects.filter(x => x.id !== id);
        if (view.projectId === id) { view.screen = 'list'; view.projectId = null; }
        if (openProjMenuId === id) openProjMenuId = null;
        render();
      });
    };
  });

  document.querySelectorAll('[data-proj-menu]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.projMenu;
      openProjMenuId = (openProjMenuId === id) ? null : id;
      render();
    };
  });
  document.querySelectorAll('[data-dup-proj]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.dupProj;
      const p = projects.find(x => x.id === id);
      if (!p) return;
      const copy = duplicateProject(p);
      const idx = projects.findIndex(x => x.id === id);
      projects.splice(idx + 1, 0, copy);
      openProjMenuId = null;
      render();
    };
  });
  document.onclick = (e) => {
    if (openProjMenuId === null) return;
    if (e.target.closest('[data-proj-menu]') || e.target.closest('.proj-menu')) return;
    openProjMenuId = null;
    render();
  };

  document.querySelectorAll('.proj-card').forEach(el => {
    el.onclick = () => {
      if (Date.now() < suppressProjectOpenUntil) return;
      view.screen='detail'; view.projectId = el.dataset.id; calMonthOffset = 0; calEditingField = null; render();
    };
    el.ondragstart = (e) => {
      if (e.target.closest('button,input,select,textarea,a,.proj-menu')) {
        e.preventDefault();
        return;
      }
      el.classList.add('dragging');
      el.dataset.dragging = '1';
      if (e.dataTransfer) {
        e.dataTransfer.effectAllowed = 'move';
        try { e.dataTransfer.setData('text/plain', el.dataset.id); } catch (_) {}
      }
    };
    el.ondragend = () => {
      suppressProjectOpenUntil = Date.now() + 300;
      el.classList.remove('dragging');
      delete el.dataset.dragging;
      clearProjectDropMarks('.proj-card');
    };
    el.ondragover = (e) => {
      e.preventDefault();
      const draggedEl = document.querySelector('.proj-card.dragging');
      if (!draggedEl || draggedEl === el) return;
      const rect = el.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;
      clearProjectDropMarks('.proj-card');
      markProjectDropTarget(el, after, true);
      el.dataset.dropAfter = after ? '1' : '0';
    };
    el.ondragleave = (e) => {
      if (e.relatedTarget && el.contains(e.relatedTarget)) return;
      el.classList.remove('drag-before','drag-after');
      delete el.dataset.dropAfter;
    };
    el.ondrop = (e) => {
      e.preventDefault();
      const draggedEl = document.querySelector('.proj-card.dragging');
      const after = el.dataset.dropAfter === '1';
      clearProjectDropMarks('.proj-card');
      delete el.dataset.dropAfter;
      if (!draggedEl || draggedEl === el) return;
      if (moveProjectRelative(draggedEl.dataset.id, el.dataset.id, after)) {
        dismissReorderHint();
        render();
      }
    };
  });
  bindTouchProjectReorder('.proj-card', { insertionLine:true, dismissHintOnMove:true });
}

// [이벤트 · 프로젝트 상세] 수정/삭제·완료 입력·작업 구간·체크리스트·미니 달력
function bindDetailEvents(){
  const back = document.getElementById('backToList');
  if (back) back.onclick = () => { closeProjectEdit(view.projectId); view.screen='list'; render(); };

  const delProjectBtn = document.getElementById('deleteProjectBtn');
  if (delProjectBtn) delProjectBtn.onclick = () => {
    const p = projects.find(x=>x.id===view.projectId);
    customConfirm(tf('confirm.deleteProjectConfirm', { name: p.name }), async () => {
      const deletingId = view.projectId;
      closeProjectEdit(deletingId);
      bankProjectTodayContribution(p);
      await removeStickersForView('detail:' + deletingId);
      projects = projects.filter(x=>x.id!==deletingId);
      view.screen = 'list'; view.projectId = null;
      render();
    });
  };

  const totalDoneInput = document.getElementById('totalDoneInput');
  if (totalDoneInput) totalDoneInput.onchange = (e) => {
    rolloverDailyStateIfNeeded();
    const p = projects.find(x=>x.id===view.projectId);
    if (!isNonNegativeIntegerValue(e.target.value)) { showToast(t('err.completedMinZero')); render(); return; }
    let val = Number(e.target.value);
    // 직접 입력분 상한 = 전체 − 체크리스트 완료분 (합쳐서 전체를 못 넘게)
    if (p.total !== null) val = Math.min(val, p.total);
    p.manualDone = val;
    recomputeDone(p);
    render();
  };

  const doneModeToggle = document.getElementById('doneModeToggle');
  if (doneModeToggle) doneModeToggle.onclick = () => {
    const p = projects.find(x=>x.id===view.projectId);
    if (!p || isDdayProject(p) || p.total > 10) return;
    doneInputModeState[p.id] = doneInputModeState[p.id] === 'buttons' ? 'number' : 'buttons';
    render();
  };

  document.querySelectorAll('[data-quick-done]').forEach(btn => {
    btn.onclick = () => {
      rolloverDailyStateIfNeeded();
      const p = projects.find(x=>x.id===view.projectId);
      if (!p || isDdayProject(p)) return;
      const val = Number(btn.dataset.quickDone);
      if (!Number.isInteger(val) || val < 1 || val > Math.min(p.total, 10)) return;
      p.manualDone = val;
      recomputeDone(p);
      render();
    };
  });

  const midlineToggleBtn = document.getElementById('midlineToggleBtn');
  if (midlineToggleBtn) midlineToggleBtn.onclick = () => {
    const nextOpen = !bulkFormOpenState[view.projectId];
    bulkFormOpenState[view.projectId] = nextOpen;
    if (nextOpen) {
      const p = projects.find(x=>x.id===view.projectId);
      initMidlineFormState(p);
    }
    render();
  };
  const midlineDeleteAllBtn = document.getElementById('midlineDeleteAllBtn');
  if (midlineDeleteAllBtn) midlineDeleteAllBtn.onclick = () => {
    customConfirm(t('confirm.clearAllSegments'), () => {
      const p = projects.find(x=>x.id===view.projectId);
      const unassigned = (p.checklist || []).filter(i => i.segmentId).length;
      p.segments = [];
      reconcileChecklistAssignments(p);
      resetTodayTarget(p.id);
      render();
      if (unassigned) showToast(tf('toast.unassignedTodos', { n: unassigned }));
    });
  };
  const midlineEmptyCreateBtn = document.getElementById('midlineEmptyCreateBtn');
  if (midlineEmptyCreateBtn) midlineEmptyCreateBtn.onclick = () => {
    bulkFormOpenState[view.projectId] = true;
    const p = projects.find(x=>x.id===view.projectId);
    initMidlineFormState(p);
    render();
  };
  const confirmBulkAdd = document.getElementById('confirmBulkAdd');
  if (confirmBulkAdd) confirmBulkAdd.onclick = () => {
    const p = projects.find(x=>x.id===view.projectId);
    const useDefaultNames = window.matchMedia('(max-width:500px)').matches && midlineNames.length >= 4;
    normalizeMidlineDefaultNames();
    const rows = midlineNames.map((n,i) => ({ id:midlineIds[i] || null, name:useDefaultNames ? defaultSegmentName(i) : (n.trim() || defaultSegmentName(i)), amount:midlineAmounts[i] }));
    const max = midlineMaxAllowed(p);
    if (rows.length > max) { showToast(tf('err.maxSegmentsN', { n: max })); return; }
    const segBackup = cloneSegmentsForEdit(p);
    const checklistBackup = (p.checklist || []).map(i => ({...i}));
    if (!bulkCreateSegments(p, rows, { startDate: effectiveStart(p) })) {
      p.segments = segBackup;
      p.checklist = checklistBackup;
      applySpillover(p);
      showToast(t('err.cannotPlaceSegmentDatesShort'));
      render();
      return;
    }
    const segError = validateSegmentStructure(p);
    if (segError) {
      p.segments = segBackup;
      p.checklist = checklistBackup;
      applySpillover(p);
      showToast(segError);
      render();
      return;
    }
    resetTodayTarget(p.id);
    midlineNames = ['', '']; midlineAmounts = [1,1]; midlineIds = [null,null]; midlineFormProjectId = null;
    bulkFormOpenState[view.projectId] = false;
    const assignmentAfter = new Map((p.checklist || []).map(item => [item.id, item.segmentId]));
    const unassignedCount = checklistBackup.filter(item => item.segmentId && !assignmentAfter.get(item.id)).length;
    render();
    if (unassignedCount) showToast(tf('toast.unassignedExisting', { n: unassignedCount }));
  };

  document.querySelectorAll('[data-dblclick-segname]').forEach(el => {
    el.ondblclick = () => { editingSegNameId = el.dataset.dblclickSegname; editingChecklistItemId = null; render(); };
  });
  document.querySelectorAll('[data-renameseg]').forEach(el => {
    el.onclick = () => { editingSegNameId = el.dataset.renameseg; editingChecklistItemId = null; render(); };
  });
  const segNameInput = document.querySelector('.seg-name-input');
  if (segNameInput) {
    segNameInput.focus();
    segNameInput.select();
    const commit = () => {
      const p = projects.find(x=>x.id===view.projectId);
      const s = p.segments.find(s=>s.id===segNameInput.dataset.segname);
      const val = segNameInput.value.trim();
      if (val) s.name = val;
      editingSegNameId = null;
      render();
    };
    segNameInput.onkeydown = (e) => { if (e.key === 'Enter') commit(); };
    segNameInput.onblur = commit;
  }

  const editProjectBtn = document.getElementById('editProjectBtn');
  if (editProjectBtn) editProjectBtn.onclick = () => {
    const nextOpen = !projectEditOpenState[view.projectId];
    projectEditOpenState[view.projectId] = nextOpen;
    if (!nextOpen) clearProjectEditDraft(view.projectId);
    render();
  };
  document.querySelectorAll('#projectEditWrap .chip[data-eopt]').forEach(chip => {
    chip.onclick = () => {
      editPeriodState[chip.dataset.eopt] = !editPeriodState[chip.dataset.eopt];
      chip.classList.toggle('on', editPeriodState[chip.dataset.eopt]);
    };
  });
  const saveProjectEditBtn = document.getElementById('saveProjectEditBtn');
  if (saveProjectEditBtn) saveProjectEditBtn.onclick = () => {
    const p = projects.find(x=>x.id===view.projectId);
    const name = document.getElementById('e_name').value.trim();
    if (!name) { warnRequiredField(document.getElementById('e_name'), t('form.namePlaceholder')); return; }
    const totalVal = document.getElementById('e_total').value;
    if (totalVal !== '' && !isPositiveIntegerValue(totalVal)) { showToast(t('err.workloadMinOrEmpty')); return; }
    const newTotal = (totalVal === '' ? null : Number(totalVal));
    const next = {
      ...p,
      segments: cloneSegmentsForEdit(p),
      checklist: (p.checklist || []).map(i => ({...i})),
      name,
      startDate: document.getElementById('e_start').value || p.startDate,
      deadline: document.getElementById('e_deadline').value || p.deadline,
      total: newTotal,
      unit: document.getElementById('e_unit').value,
      includeToday: editPeriodState.today,
      includeDeadline: editPeriodState.deadline_inc,
      includeWeekend: editPeriodState.weekend,
      restDays: (p.restDays || []).filter(d => d !== (document.getElementById('e_deadline').value || p.deadline))
    };
    const totalChanged = newTotal !== p.total;
    const deadlineChanged = next.deadline !== p.deadline;
    const startChanged = next.startDate !== p.startDate;
    const includeChanged = p.includeToday !== next.includeToday || p.includeDeadline !== next.includeDeadline || p.includeWeekend !== next.includeWeekend;
    const planError = validatePlanDatesForWork(next, { hasTotal: newTotal !== null });
    if (planError) { showToast(planError); return; }
    if (newTotal !== null && p.segments.length > newTotal) { showToast(t('err.totalLessThanSegCount')); return; }
    if (newTotal === null) next.segments = [];
    else if (next.segments.length) {
      if (totalChanged) scaleSegmentAmounts(next, p.total);
      if (totalChanged || startChanged || deadlineChanged || includeChanged) {
        const reallocateError = reallocateSegmentsForPlanChange(next);
        if (reallocateError) { showToast(reallocateError); return; }
      } else {
        normalizeSegmentStructure(next, { refreshPlanStarts: false, baseStart: 'currentPlan' });
      }
    }
    const segPlanError = validateSegmentStructure(next);
    if (segPlanError) { showToast(segPlanError); return; }

    const becameDday = newTotal === null && p.total !== null;
    const hasDestructibleContent = becameDday && (
      (p.segments && p.segments.length > 0) ||
      (Number(p.manualDone) || 0) > 0 ||
      (p.checklist || []).some(i => i.type === 'qty')
    );

    const applyChanges = () => {
      // 작업량 제거는 완료량을 0으로 만들기 전에 오늘 진행 기여도를 먼저 보존한다.
      if (becameDday) bankProjectTodayContribution(p);
      p.name = next.name;
      p.startDate = next.startDate;
      p.deadline = next.deadline;
      p.total = next.total;
      p.unit = next.unit;
      p.includeToday = next.includeToday;
      p.includeDeadline = next.includeDeadline;
      p.includeWeekend = next.includeWeekend;
      p.restDays = next.restDays;
      p.segments = cloneSegmentsForEdit(next);
      reconcileChecklistAssignments(p);

      if (becameDday) {
        p.segments = [];
        p.manualDone = 0;
        p.done = 0;
        normalizeChecklistForProject(p);
        reconcileChecklistAssignments(p);
      } else if (p.total !== null) {
        p.manualDone = Math.min(toSafeNonNegativeInt(p.manualDone), p.total);
      }
      recomputeDone(p);
      if (totalChanged || deadlineChanged || startChanged || includeChanged) resetTodayTarget(p.id);
      projectEditOpenState[view.projectId] = false;
      clearProjectEditDraft(view.projectId);
      render();
    };

    if (hasDestructibleContent) {
      customConfirm(t('confirm.clearWorkloadWarning'), applyChanges, { confirmLabel: t('confirm.continueLabel'), confirmClass: 'danger-btn' });
    } else {
      applyChanges();
    }
  };

  document.querySelectorAll('[data-seg-cl-toggle]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.segClToggle;
      const isOpen = segmentChecklistOpenState[id] !== false; // 기본값(undefined)=열림
      segmentChecklistOpenState[id] = !isOpen;
      if (!segmentChecklistOpenState[id]) checklistAddOpenState[id] = false;
      render();
    };
  });

  document.querySelectorAll('[data-cl-toggle]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.clToggle;
      const isOpen = checklistOpenState[id] !== false; // 기본값(undefined)=열림
      checklistOpenState[id] = !isOpen;
      render();
    };
  });
  document.querySelectorAll('[data-cl-addopen]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.clAddopen;
      const p = projects.find(x=>x.id===view.projectId);
      const isSegmentTarget = !!(p && p.segments.some(s => s.id === id));
      checklistAddOpenState[id] = !checklistAddOpenState[id];
      if (isSegmentTarget) segmentChecklistOpenState[id] = true;
      checklistOpenState[id] = true;
      render();
    };
  });
  document.querySelectorAll('[data-cl-target][name=cl_type]').forEach(el => {
    el.onchange = () => {
      const qtyInput = el.closest('.checklist-add').querySelector('[name=cl_qty]');
      qtyInput.style.display = el.value === 'qty' ? '' : 'none';
    };
  });
  function confirmChecklistAdd(wrap){
    rolloverDailyStateIfNeeded();
    const p = projects.find(x=>x.id===view.projectId);
    const name = wrap.querySelector('[name=cl_name]').value.trim();
    const type = wrap.querySelector('[name=cl_type]').value;
    const qty = wrap.querySelector('[name=cl_qty]').value;
    const segmentSelect = wrap.querySelector('[name=cl_segment]');
    const requestedSegmentId = wrap.dataset.clSegment || (segmentSelect ? segmentSelect.value : '');
    const segmentId = requestedSegmentId && p.segments.some(s => s.id === requestedSegmentId) ? requestedSegmentId : null;
    if (!name) { warnRequiredField(wrap.querySelector('[name=cl_name]'), t('cl.itemName')); return; }
    if (type === 'qty' && isDdayProject(p)) { showToast(t('err.noQtyForDday')); return; }
    if (type === 'qty' && !isPositiveIntegerValue(qty)) { showToast(t('err.qtyMin1')); return; }
    addChecklistItem(p, { name, type, qty: type === 'qty' ? Number(qty) : qty, segmentId });
    if (wrap.dataset.clSegment) checklistAddOpenState[wrap.dataset.clSegment] = false;
    if (type === 'qty') resetTodayTarget(p.id);
    render();
  }
  document.querySelectorAll('[data-cl-confirm]').forEach(el => {
    el.onclick = () => confirmChecklistAdd(el.closest('.checklist-add'));
  });
  document.querySelectorAll('.checklist-add [name=cl_name], .checklist-add [name=cl_qty]').forEach(el => {
    el.onkeydown = (e) => {
      if (e.key !== 'Enter') return;
      confirmChecklistAdd(el.closest('.checklist-add'));
    };
  });
  document.querySelectorAll('[data-cl-item]').forEach(el => {
    el.onchange = () => {
      const [, itemId] = el.dataset.clItem.split(':');
      rolloverDailyStateIfNeeded();
      const p = projects.find(x=>x.id===view.projectId);
      toggleChecklistItem(p, itemId);
      render();
    };
  });
  document.querySelectorAll('[data-cl-assign]').forEach(el => {
    el.onchange = () => {
      const [, itemId] = el.dataset.clAssign.split(':');
      const p = projects.find(x=>x.id===view.projectId);
      const item = p && p.checklist.find(i => i.id === itemId);
      if (!item) return;
      item.segmentId = el.value && p.segments.some(s => s.id === el.value) ? el.value : null;
      render();
    };
  });
  document.querySelectorAll('[data-cl-rename]').forEach(el => {
    el.ondblclick = () => {
      const [, itemId] = el.dataset.clRename.split(':');
      editingChecklistItemId = itemId;
      editingSegNameId = null;
      render();
    };
  });
  // 체크리스트 인라인 수정 커밋: Enter 또는 포커스 이탈 시 저장, Esc는 취소.
  // 이름은 비어있지 않을 때만 반영, 수량은 1 이상 정수만 반영하고 완료량을 다시 계산한다.
  const clEditName = document.querySelector('[data-cl-edit-name]');
  if (clEditName) {
    const [, itemId] = clEditName.dataset.clEditName.split(':');
    const clEditQty = document.querySelector('[data-cl-edit-qty]');
    clEditName.focus();
    clEditName.select();
    let clEditDone = false;
    const commit = () => {
      if (clEditDone) return; clEditDone = true;
      rolloverDailyStateIfNeeded();
      const p = projects.find(x=>x.id===view.projectId);
      const item = p && p.checklist.find(i => i.id === itemId);
      if (item) {
        const name = clEditName.value.trim();
        if (name) item.name = name;
        if (item.type === 'qty' && clEditQty) {
          const q = Math.floor(Number(clEditQty.value));
          if (Number.isFinite(q) && q >= 1 && q !== item.qty) {
            item.qty = q;
            resetTodayTarget(p.id);
            recomputeDone(p); // 체크된 수량형이면 완료량도 바뀌므로 재계산
          }
        }
      }
      editingChecklistItemId = null;
      render();
    };
    const cancel = () => {
      if (clEditDone) return; clEditDone = true;
      editingChecklistItemId = null;
      render();
    };
    const bindKeys = (inp) => {
      inp.onkeydown = (e) => {
        if (e.key === 'Enter') commit();
        else if (e.key === 'Escape') cancel();
      };
      inp.onblur = () => {
        // 이름↔수량 입력 간 포커스 이동은 커밋하지 않음
        setTimeout(() => {
          const active = document.activeElement;
          if (active === clEditName || active === clEditQty) return;
          commit();
        }, 0);
      };
    };
    bindKeys(clEditName);
    if (clEditQty) bindKeys(clEditQty);
  }
  document.querySelectorAll('[data-cl-del]').forEach(el => {
    el.onclick = () => {
      const [, itemId] = el.dataset.clDel.split(':');
      rolloverDailyStateIfNeeded();
      const p = projects.find(x=>x.id===view.projectId);
      const item = p.checklist.find(i => i.id === itemId);
      p.checklist = p.checklist.filter(i => i.id !== itemId);
      if (item && item.type === 'qty') resetTodayTarget(p.id);
      recomputeDone(p); // 체크돼있던 수량형 항목이 지워지면 완료량도 다시 계산
      render();
    };
  });

  ['d_today','d_deadline_inc','d_weekend'].forEach(fid => {
    const el = document.getElementById(fid);
    if (el) el.onchange = () => {
      const p = projects.find(x=>x.id===view.projectId);
      const prev = {
        includeToday: p.includeToday,
        includeDeadline: p.includeDeadline,
        includeWeekend: p.includeWeekend,
        segments: cloneSegmentsForEdit(p)
      };
      p.includeToday = document.getElementById('d_today').checked;
      p.includeDeadline = document.getElementById('d_deadline_inc').checked;
      p.includeWeekend = document.getElementById('d_weekend').checked;
      const rollback = (message) => {
        p.includeToday = prev.includeToday;
        p.includeDeadline = prev.includeDeadline;
        p.includeWeekend = prev.includeWeekend;
        p.segments = prev.segments;
        applySpillover(p);
        showToast(message);
        render();
      };
      const planError = validatePlanDatesForWork(p, { hasTotal: !isDdayProject(p) });
      if (planError) { rollback(planError); return; }
      const segError = reallocateSegmentsForPlanChange(p);
      if (segError) { rollback(segError); return; }
      resetTodayTarget(p.id);
      render();
    };
  });

  const calPrev = document.getElementById('calPrev');
  if (calPrev) calPrev.onclick = () => { calMonthOffset--; render(); };
  const calNext = document.getElementById('calNext');
  if (calNext) calNext.onclick = () => { calMonthOffset++; render(); };

  document.querySelectorAll('.cal-cell[data-date]').forEach(el => {
    el.onclick = () => {
      const p = projects.find(x=>x.id===view.projectId);
      const date = el.dataset.date;
      const isDeadlineCell = date === p.deadline;
      const isStartCell = date === p.startDate;

      if (calEditingField === 'deadline') {
        const cancelling = isDeadlineCell;
        if (!cancelling && date < p.startDate) { showToast(t('err.deadlineBeforeStart')); return; }
        calEditingField = null;
        if (!cancelling) {
          const prevDeadline = p.deadline;
          const prevRestDays = p.restDays.slice();
          p.deadline = date;
          p.restDays = (p.restDays || []).filter(d => d !== p.deadline);
          const segBackup = cloneSegmentsForEdit(p);
          const planError = validatePlanDatesForWork(p, { hasTotal: !isDdayProject(p) });
          if (planError) { p.deadline = prevDeadline; p.restDays = prevRestDays; p.segments = segBackup; showToast(planError); render(); return; }
          const segError = reallocateSegmentsForPlanChange(p);
          if (segError) { p.deadline = prevDeadline; p.restDays = prevRestDays; p.segments = segBackup; applySpillover(p); showToast(segError); render(); return; }
          resetTodayTarget(p.id);
        }
        render();
        return;
      }
      if (calEditingField === 'start') {
        const cancelling = isStartCell;
        if (!cancelling && date > p.deadline) { showToast(t('err.startAfterDeadlineShort')); return; }
        calEditingField = null;
        if (!cancelling) {
          const prevStart = p.startDate;
          const segBackup = cloneSegmentsForEdit(p);
          p.startDate = date;
          const planError = validatePlanDatesForWork(p, { hasTotal: !isDdayProject(p) });
          if (planError) { p.startDate = prevStart; p.segments = segBackup; showToast(planError); render(); return; }
          const segError = reallocateSegmentsForPlanChange(p);
          if (segError) { p.startDate = prevStart; p.segments = segBackup; applySpillover(p); showToast(segError); render(); return; }
          resetTodayTarget(p.id);
        }
        render();
        return;
      }
      if (isDeadlineCell) { calEditingField = 'deadline'; render(); return; }
      if (isStartCell) { calEditingField = 'start'; render(); return; }
      if (el.dataset.locked) return;
      if (isWeekendDate(date) && !p.includeWeekend) { showToast(t('err.weekendAlreadyRest')); return; }
      const before = p.restDays.slice();
      const segBackup = cloneSegmentsForEdit(p);
      const idx = p.restDays.indexOf(date);
      if (idx >= 0) p.restDays.splice(idx,1);
      else p.restDays.push(date);
      const planError = validatePlanDatesForWork(p, { hasTotal: !isDdayProject(p) });
      if (planError) { p.restDays = before; p.segments = segBackup; showToast(planError); render(); return; }
      const segError = reallocateSegmentsForPlanChange(p);
      if (segError) { p.restDays = before; p.segments = segBackup; applySpillover(p); showToast(segError); render(); return; }
      resetTodayTarget(p.id);
      render();
    };
  });

  if (document.getElementById('midlineBar')) bindBulkEvents();

  document.querySelectorAll('.segDeadlineInput').forEach(el => {
    el.onchange = (e) => {
      const p = projects.find(x=>x.id===view.projectId);
      const sorted = p.segments.slice().sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));
      const s = p.segments.find(s=>s.id===e.target.dataset.seg);
      const idx = sorted.findIndex(x => x.id === s.id);
      const val = e.target.value;
      if (idx === sorted.length - 1) { showToast(t('err.lastSegFollowsDeadline')); render(); return; }
      if (val < p.startDate || val >= p.deadline) {
        showToast(tf('err.segmentsMustBeInRange', { start: p.startDate, deadline: p.deadline }));
        render();
        return;
      }
      if (!isBaseWorkableDate(p, val)) { showToast(t('err.segmentsMustBeWorkable')); render(); return; }
      const prevDeadline = idx > 0 ? sorted[idx-1].deadline : p.startDate;
      const nextDeadline = idx < sorted.length - 1 ? sorted[idx+1].deadline : p.deadline;
      const badPrevOrder = idx > 0 ? val <= prevDeadline : val < prevDeadline;
      if (badPrevOrder || val >= nextDeadline) { showToast(t('err.segmentOrderMismatchAdjacent')); render(); return; }
      const segBackup = cloneSegmentsForEdit(p);
      s.deadline = val;
      const segError = validateNormalizedSegments(p, { refreshPlanStarts: true, baseStart: 'currentPlan' });
      if (segError) { p.segments = segBackup; applySpillover(p); showToast(segError); render(); return; }
      resetTodayTarget(p.id);
      render();
    };
  });

  document.querySelectorAll('[data-delseg]').forEach(el => {
    el.onclick = () => {
      const p = projects.find(x=>x.id===view.projectId);
      const unassigned = deleteSegment(p, el.dataset.delseg);
      resetTodayTarget(p.id);
      render();
      if (unassigned) showToast(tf('toast.unassignedTodos', { n: unassigned }));
    };
  });
}

// [이벤트 · 백업/불러오기] 백업 저장·불러오기·이전 데이터 복구
function bindBackupEvents(){
  const doBackupDownload = async (portableData = null) => {
    try {
      const snapshot = portableData || await buildPortableData();
      const data = JSON.stringify(snapshot, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${t('backup.filenamePrefix')}${todayStr()}.json`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 0);
      markBackedUp();
      return true;
    } catch (err) {
      showToast(t(err && err.i18nKey ? err.i18nKey : 'sticker.storageReadFail'));
      return false;
    }
  };
  const backupAndSync = async () => {
    let portableData;
    try {
      portableData = await buildPortableData();
    } catch (err) {
      showToast(t(err && err.i18nKey ? err.i18nKey : 'sticker.storageReadFail'));
      return;
    }

    const connected = isLicenseUnlocked() && isGoogleSignedIn();
    const filePromise = doBackupDownload(portableData);
    const googlePromise = connected ? backupCurrentToDrive(portableData) : Promise.resolve(null);
    const [downloaded, googleResult] = await Promise.all([filePromise, googlePromise]);

    if (connected && downloaded) {
      if (googleResult && googleResult.ok) showToast(t('sync.backupBothDone'));
      else if (googleResult && googleResult.cancelled) showToast(t('sync.backupGoogleCancelled'));
      else showToast(t('sync.backupFileOnly'));
    }
    render();
  };
  document.getElementById('btnBackup').onclick = backupAndSync;
  const btnBackupNow = document.getElementById('btnBackupNow');
  if (btnBackupNow) btnBackupNow.onclick = backupAndSync;
  const btnBackupLater = document.getElementById('btnBackupLater');
  if (btnBackupLater) btnBackupLater.onclick = () => {
    backupMeta.snoozeUntil = Date.now() + BACKUP_SNOOZE_MS;
    saveBackupMeta();
    render();
  };

  const openRestoreFile = () => document.getElementById('restoreFile').click();
  document.getElementById('btnRestore').onclick = () => {
    if (isLicenseUnlocked() && isGoogleSignedIn()) {
      showRestoreSourceDialog(loadBackupFromDrive, openRestoreFile);
    } else {
      openRestoreFile();
    }
  };
  const undoBtn = document.getElementById('btnUndoRestore');
  if (undoBtn) undoBtn.onclick = () => {
    let hasSnapshot = false;
    try { hasSnapshot = !!localStorage.getItem(BEFORE_RESTORE_KEY); } catch (_) {}
    if (!hasSnapshot) { showToast(t('toast.noPrevDataToRestore')); return; }
    customConfirm(t('confirm.undoRestore'), async () => {
      try {
        const restored = await swapWithBeforeRestoreSnapshot();
        if (!restored) { showToast(t('toast.noPrevDataToRestore')); return; }
        view.screen = 'dash'; view.projectId = null;
        render();
        showToast(t('toast.restoredPrevData'));
      } catch (err) {
        showToast(t(err && err.i18nKey ? err.i18nKey : 'toast.restorePrevDataFailed'));
      }
    }, { confirmLabel:t('detail.restoreLabel'), confirmClass:'accent small' });
  };

  document.getElementById('restoreFile').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Number(data.schemaVersion) > SCHEMA_VERSION) throw new Error('newer schema');
        const prepared = prepareLoadedData(data, { rebaseDailyState: true });
        if (!prepared) throw new Error('invalid');
        const previewStats = prepared.stats;
        const details = [
          tf('restore.previewLoad', { input: previewStats.inputCount, kept: previewStats.keptCount }),
          previewStats.invalidProjects ? tf('restore.previewInvalid', { n: previewStats.invalidProjects }) : '',
          previewStats.clearedSegments ? tf('restore.previewCleared', { n: previewStats.clearedSegments }) : '',
          t('restore.previewCurrentKept')
        ].filter(Boolean).join(' ');
        customConfirm(details, async () => {
          try {
            await applyPortableRestore(data, prepared, { keepCurrentAsPrevious:true, useNowAsSavedAt:true });
            view.screen = 'dash'; view.projectId = null;
            render();
            const notes = [];
            if (prepared.stats.invalidProjects > 0) notes.push(tf('restore.doneExcluded', { n: prepared.stats.invalidProjects }));
            if (prepared.stats.clearedSegments > 0) notes.push(tf('restore.doneCleared', { n: prepared.stats.clearedSegments }));
            showToast(notes.length ? tf('toast.restoreCompleteWithNotes', { notes: notes.join(', ') }) : t('toast.restoreCompletePlain'));
          } catch (err) {
            showToast(t(err && err.i18nKey ? err.i18nKey : 'toast.applyBackupFailed'));
          }
        }, { confirmLabel:t('sync.loadBtn'), confirmClass:'accent small' });
      } catch (err) {
        alert(t('alert.invalidBackupFile'));
      }
    };
    reader.onerror = () => { alert(t('alert.fileReadError')); };
    reader.onloadend = () => { e.target.value = ''; };
    reader.readAsText(file);
  };

}

let midnightTimer = null;
function scheduleMidnightRollover(){
  clearTimeout(midnightTimer);
  const now = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 1);
  midnightTimer = setTimeout(() => {
    if (rolloverDailyStateIfNeeded()) render();
    scheduleMidnightRollover();
  }, Math.max(next - now, 1000));
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (rolloverDailyStateIfNeeded()) render();
    scheduleMidnightRollover();
    if (isLeaderTab) writeLeaderHeartbeat();
    else monitorLeadership();
    if (isLicenseUnlocked() && isGoogleSignedIn()) syncWithDrive(); // 다른 기기/앱 갔다 돌아왔을 때 최신 데이터 있는지 확인
    checkStorageQuota({ force:true }).catch(() => {});
  }
});
// 다른 탭의 리더 변경과 데이터 저장을 즉시 반영한다.
window.addEventListener('storage', (e) => {
  if (e.key === LEADER_KEY) {
    const info = readLeaderInfo();
    const stillLeader = !!info && info.id === TAB_ID && isFreshLeader(info);
    const changed = isLeaderTab !== stillLeader;
    if (stillLeader) {
      isLeaderTab = true;
      startLeaderHeartbeat();
    } else if (isLeaderTab) {
      handleLeadershipLost();
    }
    if (!info || !isFreshLeader(info)) monitorLeadership();
    if (changed) render();
    return;
  }
  if (e.key !== STORAGE_KEY) return;
  // 정상적인 팔로워는 이미 저장이 막혀 있으므로 경고할 필요가 없다.
  // 리더라고 생각하던 탭에서 타 탭 저장을 감지한 경우에만 안전장치로 즉시 잠근다.
  if (isLeaderTab && !staleTabWarning) {
    staleTabWarning = true;
    handleLeadershipLost();
    showToast(t('sync.staleTabBlockSync'));
    render();
  }
});
// 탭을 정상적으로 닫거나 새로고침할 때 리더 자리를 비워, 다음에 여는 탭이 곧바로 이어받을 수 있게 함
window.addEventListener('beforeunload', releaseLeadershipOnUnload);

// ===== 앱 시작 =====
loadLocal();
loadSyncMeta();
loadBackupMeta();
// 이 기기에 저장된 데이터가 전혀 없는(완전히 새로운) 경우: "방금 막 생긴 빈 상태"를 실제 변경으로 착각하지 않게
// 기준 시각을 가장 오래된 값(0)으로 남겨둔다. 이래야 나중에 구글 드라이브 동기화에서 "이 기기가 최신"이라고
// 잘못 판단해 진짜 데이터가 있는 드라이브 쪽을 덮어쓰는 사고가 안 생긴다.
if (!lastPersistedJson) {
  lastChangedAt = 0;
  lastPersistedJson = JSON.stringify(buildPersistedData());
}
// 활성 리더가 없거나 하트비트가 5초 이상 끊겼을 때만 이 탭이 리더가 된다.
claimLeadership();
startLeadershipMonitor();
applyStaticLang();
const langToggleBtn = document.getElementById('btnLangToggle');
if (langToggleBtn) langToggleBtn.onclick = () => setLang(currentLang === 'ko' ? 'en' : 'ko');
initStickerUi();
render();
LicenseVault.init().then(() => {
  render();
  return revalidateLicenseIfNeeded();
}).catch(() => {});
checkStorageQuota({ force:true }).catch(() => {});
cleanupOrphanStickerAssets().catch(() => {});
scheduleMidnightRollover();
</script>
